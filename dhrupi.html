<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Samurai Boss Fight</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{overflow:hidden;background:#000;width:100vw;height:100vh;}
  canvas{display:block;width:100vw;height:100vh;image-rendering:pixelated;}
  #ui{position:fixed;inset:0;pointer-events:none;z-index:10;}
  #subtitle{
    position:fixed;bottom:44px;left:50%;transform:translateX(-50%);
    font-family:"Press Start 2P",monospace;font-size:13px;
    color:#fff;text-shadow:0 0 8px #000,0 2px 0 #000,2px 0 0 #000,-2px 0 0 #000,0 -2px 0 #000;
    letter-spacing:1px;text-align:center;white-space:nowrap;
    opacity:0;transition:opacity 0.25s;
  }
  #subtitle.show{opacity:1;}
  #toptext{
    position:fixed;top:28px;left:50%;transform:translateX(-50%);
    font-family:"Press Start 2P",monospace;font-size:18px;
    color:#ffd060;letter-spacing:6px;
    text-shadow:0 0 24px #ff8800,0 0 48px #ff440066,2px 2px 0 #000;
    opacity:0;transition:opacity 0.3s;white-space:nowrap;
  }
  #toptext.show{opacity:1;}
  #flash{position:fixed;inset:0;pointer-events:none;opacity:0;z-index:20;}
  #scanlines{
    position:fixed;inset:0;pointer-events:none;z-index:5;
    background:repeating-linear-gradient(to bottom,
      transparent 0px,transparent 2px,
      rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
  }
  #vignette{
    position:fixed;inset:0;pointer-events:none;z-index:4;
    background:radial-gradient(ellipse 75% 65% at 50% 50%,transparent 40%,rgba(0,0,0,0.72) 100%);
  }
  /* H to hub */
  #hub-hint{
    position:fixed;bottom:12px;right:16px;
    font-family:"Press Start 2P",monospace;font-size:8px;
    color:rgba(255,255,255,0.3);letter-spacing:1px;pointer-events:none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="toptext"></div>
  <div id="subtitle"></div>
  <div id="scanlines"></div>
  <div id="vignette"></div>
  <div id="flash"></div>
  <div id="hub-hint">[H] HUB</div>
</div>
<script>
// ── Hub navigation ──
document.addEventListener('keydown', e => {
  if(e.key==='h'||e.key==='H'){
    sessionStorage.setItem('returning','1');
    window.location.href='test.html';
  }
});

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const flashEl=document.getElementById('flash');
const subEl=document.getElementById('subtitle');
const topEl=document.getElementById('toptext');

function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

// ── Helpers ──
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const easeOut=(t)=>1-(1-t)*(1-t);
const easeIn=(t)=>t*t;
const easeInOut=(t)=>t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
const GY=()=>canvas.height*0.74;

// ── Camera ──
const CAM={
  x:0,y:0,zoom:1,tx:0,ty:0,tz:1,
  shakeAmt:0,shakeDur:0,shakeT:0,
  update(dt){
    this.x=lerp(this.x,this.tx,0.10);
    this.y=lerp(this.y,this.ty,0.10);
    this.zoom=lerp(this.zoom,this.tz,0.07);
    if(this.shakeT<this.shakeDur)this.shakeT+=dt;
    else this.shakeAmt=0;
  },
  apply(){
    ctx.save();
    ctx.translate(canvas.width/2,canvas.height/2);
    ctx.scale(this.zoom,this.zoom);
    let sx=0,sy=0;
    if(this.shakeAmt>0){
      const decay=1-this.shakeT/this.shakeDur;
      sx=(Math.random()-.5)*this.shakeAmt*decay;
      sy=(Math.random()-.5)*this.shakeAmt*decay;
    }
    ctx.translate(-this.x+sx,-this.y+sy);
  },
  restore(){ctx.restore();},
  set(x,y,z){this.tx=x;this.ty=y;this.tz=z;},
  shake(amt,dur){this.shakeAmt=amt;this.shakeDur=dur;this.shakeT=0;}
};

// ── Timeline ──
const PH={
  INTRO:0, INTRO_E:3000,
  RUN:3000, RUN_E:6500,
  CLASH:6500, CLASH_E:9800,
  SLOWMO:9800, SLOWMO_E:13000,
  IMPACT:13000, IMPACT_E:15500,
  GLOW:15500, GLOW_E:18500,
  LOOP:19500
};

// ── State ──
let startTime=null,lastTime=0,hitStopUntil=0,lastSlash=-1;
let animationDone = false; // when true, the cinematic will stop and not repeat
const hero={x:0,y:0,facing:1,pose:{run:0,kick:0,clash:0},trail:[]};
const king={x:0,y:0,W:180,H:290,shattered:false,hitFlash:0,recoilX:0,cracks:0,breathT:0};
const dust=[],shards=[],glow=[],slashes=[],sparks=[],rings=[];

// ── Subtitles / Tops ──
const SUBS = [
  { t0: 0,    t1: 2500,  text: "POV: sophomore year and you’re still aura farming before class." },
  { t0: 2800, t1: 6200,  text: "Running on 6-7 hours? Nah. More like 6-7 minutes." },
  { t0: 6200, t1: 9000,  text: "Locked in for 10 seconds, then instant academic crashout." },
  { t0: 9000, t1: 12000, text: "Delulu but productive: 'I can finish everything tonight.'" },
  { t0: 12000,t1: 14500, text: "That hit had more impact than seeing Canvas update at midnight." },
  { t0: 14500,t1: 17500, text: "365 buttons mindset: it makes sense to me, that’s enough." }
];

const TOPS=[
  {t0:200,t1:3000,text:'THE HOLLOW KING'},
  {t0:6500,t1:9800,text:'CLASH'},
  {t0:13000,t1:15500,text:'IMPACT'},
];

// ── Screen flash ──
function flashScreen(col,ms){
  flashEl.style.background=col;
  flashEl.style.transition='opacity 0.04s';
  flashEl.style.opacity='0.85';
  setTimeout(()=>{flashEl.style.transition='opacity 0.4s';flashEl.style.opacity='0';},ms);
}
function hitStop(ms){hitStopUntil=performance.now()+ms;}

// ── Particles ──
function spawnDust(x,y,n=6){
  for(let i=0;i<n;i++){
    const a=(Math.random()-.5)*Math.PI*.7;
    const s=2+Math.random()*5;
    dust.push({x,y,vx:Math.cos(a)*s,vy:-Math.abs(Math.sin(a)*s)-1,life:1,size:3+Math.random()*4});
  }
}
function spawnSparks(x,y,n=20){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=3+Math.random()*8;
    sparks.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:1,hue:30+Math.random()*40});
  }
}
function spawnSlash(x1,y1,x2,y2){slashes.push({x1,y1,x2,y2,life:1});}
function spawnRing(x,y){rings.push({x,y,r:0,life:1});}
function spawnGlowRays(cx,cy){
  for(let i=0;i<220;i++){
    const a=(i/220)*Math.PI*2;
    glow.push({x:cx,y:cy,a,len:60+Math.random()*200,life:1});
  }
}
function makeShards(){
  shards.length=0;glow.length=0;
  const cx=king.x,cy=king.y-king.H/2;
  const C=10,R=15;
  for(let i=0;i<C;i++)for(let j=0;j<R;j++){
    const w=king.W/C,h=king.H/R;
    const sx=cx-king.W/2+w*(i+.5),sy=cy+h*(j+.5);
    const a=Math.random()*Math.PI*2,s=4+Math.random()*9;
    shards.push({x:sx,y:sy,vx:Math.cos(a)*s,vy:Math.sin(a)*s-3,rot:Math.random()*Math.PI*2,vr:(Math.random()-.5)*.3,w,h,life:1});
  }
  spawnGlowRays(cx,cy);
  spawnRing(cx,cy);
  spawnSparks(cx,cy-king.H*.4,40);
  spawnDust(king.x,king.y,30);
}

// ── Draw helpers for pixel-art style shapes ──
function px_roundRect(x,y,w,h,r=0){
  ctx.beginPath();
  if(r===0){ctx.rect(x,y,w,h);}
  else{ctx.roundRect(x,y,w,h,r);}
  ctx.fill();
}

// ── HERO (Samurai) – drastically improved pixel-art character ──
function drawHero(x,y,pose,alpha=1){
  ctx.save();
  ctx.translate(Math.round(x),Math.round(y));
  ctx.globalAlpha=alpha;

  const run=clamp(pose.run,0,1);
  const kick=clamp(pose.kick,0,1);
  const clash=clamp(pose.clash,0,1);
  const swing=Math.sin(run*Math.PI*4);
  const kickAng=lerp(-0.7-swing*.5,-2.0,easeOut(kick));

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.beginPath();ctx.ellipse(0,4,18,5,0,0,Math.PI*2);ctx.fill();

  // ─── LEGS ───
  // Back leg
  ctx.save();ctx.translate(-6,-5);
  ctx.rotate(0.25+swing*.4-clash*.35);
  ctx.fillStyle='#1a1a2e';ctx.fillRect(-5,0,10,54);
  ctx.fillStyle='#0f0f1e';ctx.fillRect(-5,44,10,12); // boot
  ctx.fillStyle='#c8922a';ctx.fillRect(-6,42,12,4); // boot trim
  ctx.restore();

  // Front leg / kick
  ctx.save();ctx.translate(7,-5);
  ctx.rotate(kickAng-clash*.1);
  ctx.fillStyle='#1a1a2e';ctx.fillRect(-5,0,10,54);
  ctx.fillStyle='#0f0f1e';ctx.fillRect(-5,44,10,12);
  ctx.fillStyle='#c8922a';ctx.fillRect(-6,42,12,4);
  ctx.restore();

  // ─── CAPE / HAORI ───
  ctx.save();
  const capeSwing=swing*.08+clash*.05;
  ctx.fillStyle='#1a0a0a';
  ctx.beginPath();
  ctx.moveTo(-14,-72);
  ctx.quadraticCurveTo(-30+capeSwing*20,-40,-32+capeSwing*30,10);
  ctx.quadraticCurveTo(-20+capeSwing*10,18,6,-14);
  ctx.lineTo(14,-72);
  ctx.closePath();ctx.fill();
  // Cape highlight
  ctx.strokeStyle='rgba(80,20,20,0.6)';ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(-14,-72);
  ctx.quadraticCurveTo(-28+capeSwing*20,-38,-30+capeSwing*30,10);
  ctx.stroke();
  ctx.restore();

  // ─── BODY / ROBE ───
  const lean=clash*.08;
  ctx.save();ctx.rotate(lean);
  // Main robe body
  const robeG=ctx.createLinearGradient(-16,-85,18,5);
  robeG.addColorStop(0,'#e84060');
  robeG.addColorStop(0.45,'#ff5070');
  robeG.addColorStop(1,'#aa2840');
  ctx.fillStyle=robeG;
  ctx.beginPath();
  ctx.moveTo(-16,-85);ctx.lineTo(16,-85);
  ctx.lineTo(18,0);ctx.lineTo(-18,0);
  ctx.closePath();ctx.fill();
  // Robe shading — dark left side
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.beginPath();
  ctx.moveTo(-16,-85);ctx.lineTo(-4,-85);ctx.lineTo(-4,0);ctx.lineTo(-18,0);ctx.closePath();ctx.fill();
  // Robe highlight — bright right edge
  ctx.fillStyle='rgba(255,180,180,0.12)';
  ctx.beginPath();
  ctx.moveTo(10,-85);ctx.lineTo(16,-85);ctx.lineTo(18,0);ctx.lineTo(12,0);ctx.closePath();ctx.fill();
  // Robe hem details
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(-18,-4,36,4);
  ctx.restore();

  // ─── BELT ───
  ctx.fillStyle='#f0c830';ctx.fillRect(-17,-42,34,8);
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(-17,-40,34,3);
  ctx.fillStyle='#fff8c0';ctx.fillRect(-3,-42,6,3); // belt knot highlight
  // Belt buckle
  ctx.fillStyle='#e8a820';ctx.fillRect(-5,-43,10,9);
  ctx.strokeStyle='#b07810';ctx.lineWidth=1;ctx.strokeRect(-5,-43,10,9);

  // ─── BACK ARM ───
  ctx.save();ctx.translate(-8,-58);
  ctx.rotate(-0.38-clash*.65);
  const armG1=ctx.createLinearGradient(-5,0,5,42);
  armG1.addColorStop(0,'#e84060');armG1.addColorStop(1,'#aa2840');
  ctx.fillStyle=armG1;ctx.fillRect(-5,0,10,42);
  ctx.fillStyle='#f5ddd0';ctx.fillRect(-5,38,10,8); // hand
  ctx.restore();

  // ─── FRONT ARM + SWORD ───
  ctx.save();ctx.translate(8,-58);
  ctx.rotate(0.55-clash*1.3);
  const armG2=ctx.createLinearGradient(-5,0,5,42);
  armG2.addColorStop(0,'#e84060');armG2.addColorStop(1,'#aa2840');
  ctx.fillStyle=armG2;ctx.fillRect(-5,0,10,42);
  ctx.fillStyle='#f5ddd0';ctx.fillRect(-5,38,10,8);

  // Sword
  ctx.save();ctx.translate(0,42);ctx.rotate(-0.2-clash*.95);
  // Guard
  ctx.fillStyle='#c8922a';ctx.fillRect(-9,-3,18,5);
  ctx.fillStyle='#f0c840';ctx.fillRect(-9,-3,18,2);
  // Handle
  ctx.fillStyle='#3a2010';ctx.fillRect(-3,-22,6,22);
  ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(-1,-22,2,22);
  // Handle wrap
  for(let i=0;i<4;i++){
    ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(-3,-20+i*5,6,2);
  }
  // Blade — long, tapered
  const bladeG=ctx.createLinearGradient(-3,0,3,105);
  bladeG.addColorStop(0,'#ffffff');
  bladeG.addColorStop(0.1,'#d0eeff');
  bladeG.addColorStop(0.55,'#88c8e8');
  bladeG.addColorStop(1,'#4480a0');
  ctx.fillStyle=bladeG;
  // Tapered blade shape
  ctx.beginPath();
  ctx.moveTo(-3,0);ctx.lineTo(3,0);
  ctx.lineTo(1.5,105);ctx.lineTo(-1.5,105);
  ctx.closePath();ctx.fill();
  // Blade edge highlight
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.beginPath();ctx.moveTo(-1.5,0);ctx.lineTo(0,0);ctx.lineTo(0,105);ctx.lineTo(-1.5,105);ctx.closePath();ctx.fill();
  // Blade glow when clashing
  if(clash>0.1){
    ctx.shadowColor='#88d8ff';ctx.shadowBlur=20*clash;
    ctx.fillStyle=`rgba(180,230,255,${clash*0.4})`;
    ctx.beginPath();ctx.moveTo(-3,0);ctx.lineTo(3,0);ctx.lineTo(1.5,105);ctx.lineTo(-1.5,105);ctx.closePath();ctx.fill();
    ctx.shadowBlur=0;
  }
  ctx.restore();
  ctx.restore();

  // ─── HEAD ───
  // Neck
  ctx.fillStyle='#f5ddd0';ctx.fillRect(-5,-97,10,12);
  // Head base
  ctx.fillStyle='#f5ddd0';
  ctx.beginPath();ctx.roundRect(-16,-125,32,30,4);ctx.fill();
  // Face shading
  ctx.fillStyle='rgba(0,0,0,0.12)';ctx.fillRect(-16,-125,8,30); // left shadow
  ctx.fillStyle='rgba(255,220,200,0.3)';ctx.fillRect(6,-125,8,30); // right highlight
  // Eyes — determined expression
  ctx.fillStyle='#1a0808';ctx.fillRect(-10,-117,8,6);ctx.fillRect(2,-117,8,6);
  ctx.fillStyle='#fff';ctx.fillRect(-9,-116,3,3);ctx.fillRect(3,-116,3,3); // eye whites
  ctx.fillStyle='#cc2030';ctx.fillRect(-8,-115,4,3);ctx.fillRect(4,-115,4,3); // pupils glow
  // Nose
  ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(-2,-108,4,4);
  // Mouth — gritted teeth / serious
  ctx.fillStyle='#2a1010';ctx.fillRect(-7,-103,14,4);
  ctx.fillStyle='#fff';ctx.fillRect(-6,-102,3,2);ctx.fillRect(-1,-102,3,2);ctx.fillRect(4,-102,3,2);
  // Eyebrows — angry
  ctx.fillStyle='#1a0808';
  ctx.save();ctx.translate(-6,-119);ctx.rotate(-0.3);ctx.fillRect(0,0,10,3);ctx.restore();
  ctx.save();ctx.translate(3,-119);ctx.rotate(0.3);ctx.fillRect(0,0,10,3);ctx.restore();

  // ─── HAIR / TOPKNOT ───
  ctx.fillStyle='#0d0810';
  ctx.beginPath();ctx.roundRect(-16,-132,32,12,3);ctx.fill();
  // Topknot
  ctx.beginPath();ctx.ellipse(0,-138,7,10,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1a1428';ctx.beginPath();ctx.ellipse(0,-138,5,8,0,0,Math.PI*2);ctx.fill();
  // Hair highlight
  ctx.fillStyle='rgba(80,60,100,0.5)';ctx.fillRect(-14,-132,28,4);

  // ─── HEADBAND ───
  ctx.fillStyle='#00ccff';ctx.fillRect(-22,-128,44,8);
  // Headband highlight
  ctx.fillStyle='rgba(255,255,255,0.35)';ctx.fillRect(-22,-128,44,3);
  // Headband glow
  ctx.shadowColor='#00ccff';ctx.shadowBlur=14;
  ctx.fillStyle='rgba(0,200,255,0.6)';ctx.fillRect(-22,-128,44,8);
  ctx.shadowBlur=0;
  // Headband tails
  ctx.fillStyle='#00aadd';
  ctx.beginPath();ctx.moveTo(18,-120);ctx.lineTo(28,-118);ctx.lineTo(30,-112);ctx.lineTo(20,-115);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(20,-115);ctx.lineTo(32,-110);ctx.lineTo(34,-104);ctx.lineTo(22,-108);ctx.closePath();ctx.fill();

  ctx.restore();
}

// ── HOLLOW KING – much more detailed ──
function drawKing(alpha=1){
  if(alpha<=0)return;
  ctx.save();
  ctx.translate(Math.round(king.x+(king.recoilX||0)),Math.round(king.y));
  ctx.globalAlpha=alpha;

  const breath=1+0.018*Math.sin(king.breathT*0.07);
  const flash=king.hitFlash||0;
  ctx.scale(1,breath);

  // ─── Ground shadow ───
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.beginPath();ctx.ellipse(0,12,king.W*.52,16,0,0,Math.PI*2);ctx.fill();

  // ─── Robe lower ───
  const robeG=ctx.createLinearGradient(-king.W/2,-king.H,king.W/2,0);
  robeG.addColorStop(0,'#180c28');
  robeG.addColorStop(0.35,'#2a1445');
  robeG.addColorStop(0.7,'#1e1038');
  robeG.addColorStop(1,'#0f0820');
  ctx.fillStyle=robeG;
  ctx.beginPath();
  ctx.moveTo(-king.W/2+10,0);
  ctx.lineTo(-king.W/2,-king.H*.55);
  ctx.lineTo(-king.W/2+20,-king.H);
  ctx.lineTo(king.W/2-20,-king.H);
  ctx.lineTo(king.W/2,-king.H*.55);
  ctx.lineTo(king.W/2+10,0);
  ctx.closePath();ctx.fill();

  // Robe left shading
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.moveTo(-king.W/2+10,0);ctx.lineTo(-king.W/2,-king.H*.55);ctx.lineTo(-king.W/2+20,-king.H);
  ctx.lineTo(-king.W/2+50,-king.H);ctx.lineTo(-king.W/2+40,-king.H*.55);ctx.lineTo(-king.W/2+30,0);
  ctx.closePath();ctx.fill();

  // Robe edge glow
  ctx.strokeStyle=flash>0?`rgba(255,80,80,${0.6+flash*.4})`:`rgba(160,80,220,0.5)`;
  ctx.lineWidth=3;
  ctx.shadowColor=flash>0?'#ff4040':'#a050e0';ctx.shadowBlur=flash>0?30:14;
  ctx.beginPath();
  ctx.moveTo(-king.W/2+10,0);ctx.lineTo(-king.W/2,-king.H*.55);ctx.lineTo(-king.W/2+20,-king.H);
  ctx.lineTo(king.W/2-20,-king.H);ctx.lineTo(king.W/2,-king.H*.55);ctx.lineTo(king.W/2+10,0);
  ctx.closePath();ctx.stroke();
  ctx.shadowBlur=0;

  // ─── Armor plates ───
  // Chest plate
  const chestG=ctx.createLinearGradient(-50,-king.H+20,50,-king.H*.4);
  chestG.addColorStop(0,'#2a1850');chestG.addColorStop(0.5,'#3e2468');chestG.addColorStop(1,'#1a1030');
  ctx.fillStyle=chestG;
  ctx.beginPath();ctx.roundRect(-52,-king.H+20,104,king.H*.55,6);ctx.fill();
  ctx.strokeStyle='rgba(160,100,255,0.4)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.roundRect(-52,-king.H+20,104,king.H*.55,6);ctx.stroke();
  // Chest plate ribs
  for(let i=0;i<3;i++){
    const cy=-king.H+50+i*30;
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(-48,cy,96,4);
    ctx.fillStyle='rgba(120,80,180,0.25)';ctx.fillRect(-48,cy+1,96,2);
  }
  // Chest rune glyph
  ctx.strokeStyle=`rgba(200,150,255,${0.3+flash*.3})`;ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(0,-king.H+55);ctx.lineTo(0,-king.H+95);
  ctx.moveTo(-18,-king.H+60);ctx.lineTo(18,-king.H+60);
  ctx.moveTo(-12,-king.H+75);ctx.lineTo(12,-king.H+75);
  ctx.stroke();

  // ─── Shoulder pauldrons ───
  for(const side of[-1,1]){
    const px=side*(king.W/2-10);
    // Main pauldron
    const pG=ctx.createRadialGradient(px,-king.H+60,5,px,-king.H+60,40);
    pG.addColorStop(0,'#3a2060');pG.addColorStop(1,'#180c30');
    ctx.fillStyle=pG;
    ctx.beginPath();
    ctx.ellipse(px,-king.H+60,38,30,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(140,80,220,0.5)';ctx.lineWidth=2;
    ctx.beginPath();ctx.ellipse(px,-king.H+60,38,30,0,0,Math.PI*2);ctx.stroke();
    // Shoulder spikes
    for(let s=0;s<3;s++){
      const sa=(-0.4+s*0.4)*side;
      ctx.save();ctx.translate(px,-king.H+45);ctx.rotate(sa-Math.PI/2*side);
      ctx.fillStyle='#0f0820';
      ctx.beginPath();ctx.moveTo(-4,0);ctx.lineTo(0,-28+s*4);ctx.lineTo(4,0);ctx.closePath();ctx.fill();
      ctx.strokeStyle='rgba(120,60,200,0.4)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(-4,0);ctx.lineTo(0,-28+s*4);ctx.lineTo(4,0);ctx.closePath();ctx.stroke();
      ctx.restore();
    }
    // Arms
    ctx.fillStyle='#1a0e30';
    ctx.beginPath();
    ctx.moveTo(px,-king.H+80);
    ctx.quadraticCurveTo(px+side*25,-king.H*.5,px+side*20,-king.H*.15);
    ctx.lineTo(px+side*8,-king.H*.15);
    ctx.quadraticCurveTo(px+side*12,-king.H*.5,px,-king.H+90);
    ctx.closePath();ctx.fill();
    // Gauntlet
    ctx.fillStyle='#2a1850';ctx.beginPath();
    ctx.ellipse(px+side*22,-king.H*.16,14,18,0,0,Math.PI*2);ctx.fill();
    // Claw hand
    ctx.fillStyle='#0f0818';
    for(let c=0;c<4;c++){
      const ca=(-0.3+c*.2)*side-Math.PI/2;
      ctx.save();ctx.translate(px+side*22,-king.H*.08);ctx.rotate(ca);
      ctx.fillRect(-2,0,4,20);
      ctx.fillStyle='#3a1a50';ctx.fillRect(-1,18,2,6);
      ctx.restore();
    }
  }

  // ─── Armor cracks ───
  if(king.cracks>0){
    ctx.save();
    ctx.strokeStyle=`rgba(255,60,100,${king.cracks*.9})`;
    ctx.lineWidth=2.5;
    ctx.shadowColor='#ff2244';ctx.shadowBlur=12*king.cracks;
    ctx.beginPath();
    ctx.moveTo(-50,-king.H+30);ctx.lineTo(-15,-king.H+80);ctx.lineTo(-35,-king.H*.4);
    ctx.moveTo(45,-king.H+40);ctx.lineTo(18,-king.H*.5);ctx.lineTo(38,0);
    ctx.moveTo(-20,-king.H*.3);ctx.lineTo(10,-king.H*.2);ctx.lineTo(-5,0);
    ctx.stroke();
    ctx.shadowBlur=0;
    // Crack glow fill
    ctx.fillStyle=`rgba(255,40,80,${king.cracks*.15})`;
    ctx.beginPath();ctx.roundRect(-52,-king.H+20,104,king.H*.55,6);ctx.fill();
    ctx.restore();
  }

  // ─── Head ───
  const headY=-king.H-50;
  // Neck
  ctx.fillStyle='#1a0e2a';ctx.fillRect(-16,-king.H,32,20);

  // Head shape — angular, imposing
  const headG=ctx.createRadialGradient(-8,headY,6,0,headY,56);
  headG.addColorStop(0,'#3a2260');headG.addColorStop(0.5,'#261448');headG.addColorStop(1,'#100820');
  ctx.fillStyle=headG;
  ctx.beginPath();
  ctx.moveTo(-44,headY+40);
  ctx.lineTo(-50,headY-10);
  ctx.lineTo(-30,headY-45);
  ctx.lineTo(0,headY-52);
  ctx.lineTo(30,headY-45);
  ctx.lineTo(50,headY-10);
  ctx.lineTo(44,headY+40);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(140,80,220,0.4)';ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(-44,headY+40);ctx.lineTo(-50,headY-10);ctx.lineTo(-30,headY-45);
  ctx.lineTo(0,headY-52);ctx.lineTo(30,headY-45);ctx.lineTo(50,headY-10);ctx.lineTo(44,headY+40);ctx.closePath();ctx.stroke();
  // Face shading
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();ctx.moveTo(-44,headY+40);ctx.lineTo(-50,headY-10);ctx.lineTo(-20,headY-40);ctx.lineTo(-10,headY+40);ctx.closePath();ctx.fill();

  // ─── Crown / Helmet ridge ───
  ctx.fillStyle='#0f0820';
  ctx.beginPath();
  ctx.moveTo(-32,headY-42);ctx.lineTo(0,headY-72);ctx.lineTo(32,headY-42);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(180,100,255,0.5)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(-32,headY-42);ctx.lineTo(0,headY-72);ctx.lineTo(32,headY-42);ctx.stroke();
  // Crown gem
  const gemP=0.5+0.5*Math.sin(king.breathT*.06);
  ctx.fillStyle=flash>0?'#ff8080':`rgba(220,150,255,${0.7+gemP*.3})`;
  ctx.shadowColor=flash>0?'#ff4040':'#cc80ff';ctx.shadowBlur=flash>0?30:16+gemP*8;
  ctx.beginPath();ctx.moveTo(0,headY-70);ctx.lineTo(8,headY-56);ctx.lineTo(0,headY-48);ctx.lineTo(-8,headY-56);ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;

  // ─── Horns ───
  for(const side of[-1,1]){
    ctx.fillStyle='#0a0614';
    ctx.beginPath();
    ctx.moveTo(side*24,headY-30);
    ctx.lineTo(side*55,headY-72);
    ctx.lineTo(side*38,headY-22);
    ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(100,60,160,0.4)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(side*24,headY-30);ctx.lineTo(side*55,headY-72);ctx.lineTo(side*38,headY-22);ctx.closePath();ctx.stroke();
    // Horn secondary
    ctx.fillStyle='#12082a';
    ctx.beginPath();ctx.moveTo(side*30,headY-15);ctx.lineTo(side*62,headY-50);ctx.lineTo(side*48,headY-10);ctx.closePath();ctx.fill();
  }

  // ─── Eyes ───
  const eyeGlow=flash>0?60:24+Math.sin(king.breathT*.04)*8;
  ctx.shadowColor=flash>0?'#ff2020':'#ff1030';ctx.shadowBlur=eyeGlow;
  // Eye sockets (dark)
  ctx.fillStyle='#050208';ctx.fillRect(-38,headY-20,24,14);ctx.fillRect(14,headY-20,24,14);
  // Eye glow
  ctx.fillStyle=flash>0?'#ff7070':'#ff1030';
  // Left eye — slanted
  ctx.save();ctx.translate(-26,headY-13);ctx.rotate(0.12);
  ctx.fillRect(-9,-4,18,10);
  ctx.fillStyle='rgba(255,80,80,0.5)';ctx.fillRect(-9,-4,18,4);
  ctx.restore();
  // Right eye
  ctx.save();ctx.translate(26,headY-13);ctx.rotate(-0.12);
  ctx.fillRect(-9,-4,18,10);
  ctx.fillStyle='rgba(255,80,80,0.5)';ctx.fillRect(-9,-4,18,4);
  ctx.restore();
  ctx.shadowBlur=0;

  // Brow ridges — heavy
  ctx.fillStyle='#0a0618';
  ctx.save();ctx.translate(-26,headY-22);ctx.rotate(0.15);ctx.fillRect(-14,-3,28,6);ctx.restore();
  ctx.save();ctx.translate(26,headY-22);ctx.rotate(-0.15);ctx.fillRect(-14,-3,28,6);ctx.restore();

  // ─── Nose ───
  ctx.fillStyle='#150a22';ctx.fillRect(-6,headY+2,12,12);

  // ─── Mouth / Grin ───
  ctx.fillStyle='#0a0414';ctx.fillRect(-26,headY+16,52,10);
  // Teeth
  ctx.fillStyle='#c8d0c8';
  for(let i=0;i<6;i++){ctx.fillRect(-22+i*8,headY+16,5,7);}
  // Mouth glow
  ctx.fillStyle=`rgba(255,30,50,${0.2+flash*.3})`;ctx.fillRect(-26,headY+16,52,10);

  ctx.restore();
}

// ── Background ──
function drawBG(t){
  const gy=GY();
  // Sky gradient — deep purple/crimson
  const sky=ctx.createLinearGradient(0,0,0,canvas.height);
  sky.addColorStop(0,'#080318');
  sky.addColorStop(0.3,'#150828');
  sky.addColorStop(0.6,'#0f0518');
  sky.addColorStop(0.85,'#0a0310');
  sky.addColorStop(1,'#050108');
  ctx.fillStyle=sky;ctx.fillRect(-4000,-4000,8000,8000);

  // Moon
  const moonX=king.x-80,moonY=gy-420;
  const moonG=ctx.createRadialGradient(moonX-10,moonY-12,4,moonX,moonY,65);
  moonG.addColorStop(0,'rgba(255,240,220,0.95)');
  moonG.addColorStop(0.4,'rgba(220,200,180,0.7)');
  moonG.addColorStop(0.7,'rgba(180,140,120,0.4)');
  moonG.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=moonG;ctx.beginPath();ctx.arc(moonX,moonY,65,0,Math.PI*2);ctx.fill();
  // Moon surface detail
  ctx.fillStyle='rgba(200,180,160,0.3)';
  ctx.beginPath();ctx.arc(moonX+12,moonY+8,18,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(moonX-20,moonY-15,10,0,Math.PI*2);ctx.fill();
  // Moon glow halo
  ctx.globalCompositeOperation='screen';
  const mhalo=ctx.createRadialGradient(moonX,moonY,30,moonX,moonY,180);
  mhalo.addColorStop(0,'rgba(255,200,140,0.12)');
  mhalo.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=mhalo;ctx.beginPath();ctx.arc(moonX,moonY,180,0,Math.PI*2);ctx.fill();
  ctx.globalCompositeOperation='source-over';

  // Stars
  ctx.save();
  const starSeed=42;
  for(let i=0;i<120;i++){
    const sx=((i*137.508+starSeed)%canvas.width)*1.8-canvas.width*.4;
    const sy=((i*97.3+starSeed)%(gy*.9));
    const sr=.4+((i*31)%10)*.14;
    const twinkle=0.4+0.5*Math.sin(t*.0012+i*2.3);
    ctx.globalAlpha=twinkle*(0.4+((i*17)%10)*.05);
    ctx.fillStyle='#e0e8ff';
    ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();

  // Backlit glow behind boss
  ctx.globalCompositeOperation='screen';
  const rimG=ctx.createRadialGradient(king.x,gy-king.H*.6,0,king.x,gy-king.H*.6,380);
  rimG.addColorStop(0,'rgba(120,40,200,0.4)');
  rimG.addColorStop(0.3,'rgba(80,20,120,0.2)');
  rimG.addColorStop(0.6,'rgba(255,80,40,0.08)');
  rimG.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=rimG;ctx.beginPath();ctx.arc(king.x,gy-king.H*.6,380,0,Math.PI*2);ctx.fill();
  ctx.globalCompositeOperation='source-over';

  // Distant mountains silhouette
  ctx.fillStyle='#0a0515';
  ctx.beginPath();ctx.moveTo(-3000,gy);
  let mx=-3000;
  const mpts=[[-2000,gy-180],[-1200,gy-90],[-700,gy-280],[-200,gy-140],[200,gy-320],[600,gy-160],[1000,gy-250],[1500,gy-100],[2000,gy-200],[3000,gy-80],[3000,gy]];
  for(const[mpx,mpy]of mpts){ctx.lineTo(mpx,mpy);}
  ctx.closePath();ctx.fill();
  // Near mountains
  ctx.fillStyle='#080410';
  ctx.beginPath();ctx.moveTo(-3000,gy);
  const nm=[[-1800,gy-100],[-900,gy-180],[-400,gy-80],[0,gy-200],[500,gy-100],[900,gy-160],[1400,gy-70],[2000,gy-120],[3000,gy-60],[3000,gy]];
  for(const[px,py]of nm)ctx.lineTo(px,py);
  ctx.closePath();ctx.fill();

  // Speed lines
  ctx.save();ctx.globalAlpha=0.12+.1*Math.sin(t*.002);
  const lCount=24;
  for(let i=0;i<lCount;i++){
    const off=((t*.045)+i*105)%(canvas.width+350)-350;
    ctx.strokeStyle=`rgba(160,100,255,${0.1+0.2*(i/lCount)})`;
    ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(off,gy+250);ctx.lineTo(off+320,gy-600);ctx.stroke();
  }
  ctx.restore();

  // Ground plane
  const groundG=ctx.createLinearGradient(0,gy,0,gy+60);
  groundG.addColorStop(0,'rgba(80,40,100,0.6)');
  groundG.addColorStop(1,'rgba(20,10,30,0.9)');
  ctx.fillStyle=groundG;ctx.fillRect(-3000,gy,6000,200);
  // Ground line glow
  ctx.strokeStyle='rgba(200,150,255,0.5)';ctx.lineWidth=2;
  ctx.shadowColor='rgba(180,100,255,0.8)';ctx.shadowBlur=18;
  ctx.beginPath();ctx.moveTo(-3000,gy);ctx.lineTo(3000,gy);ctx.stroke();
  ctx.shadowBlur=0;
  // Ground tiles/stones
  for(let i=-30;i<30;i++){
    const tx=i*80+((t*.015)%80);
    ctx.fillStyle='rgba(120,80,160,0.08)';
    ctx.fillRect(tx-38,gy+2,72,26);
    ctx.strokeStyle='rgba(100,60,140,0.15)';ctx.lineWidth=1;
    ctx.strokeRect(tx-38,gy+2,72,26);
  }
}

// ── Particle rendering ──
function updateDraw(dt){
  // Dust
  for(let i=dust.length-1;i>=0;i--){
    const p=dust[i];const s=dt*.06;
    p.x+=p.vx*s;p.y+=p.vy*s;p.vy+=.08*s;p.life-=.0012*dt;
    if(p.life<=0){dust.splice(i,1);continue;}
    ctx.globalAlpha=p.life*.55;
    ctx.fillStyle='#d8c8b0';
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();
  }
  // Sparks
  ctx.globalCompositeOperation='screen';
  for(let i=sparks.length-1;i>=0;i--){
    const p=sparks[i];const s=dt*.06;
    p.x+=p.vx*s;p.y+=p.vy*s;p.vy+=.18*s;p.life-=.018*s;
    if(p.life<=0){sparks.splice(i,1);continue;}
    ctx.globalAlpha=p.life;
    ctx.fillStyle=`hsl(${p.hue},100%,65%)`;
    ctx.beginPath();ctx.arc(p.x,p.y,2.5,0,Math.PI*2);ctx.fill();
    // spark tail
    ctx.strokeStyle=`hsla(${p.hue},100%,70%,${p.life*.5})`;
    ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x-p.vx*s*3,p.y-p.vy*s*3);ctx.stroke();
  }
  ctx.globalCompositeOperation='source-over';
  // Slash trails
  ctx.globalCompositeOperation='screen';
  for(let i=slashes.length-1;i>=0;i--){
    const s=slashes[i];s.life-=.0035*dt;
    if(s.life<=0){slashes.splice(i,1);continue;}
    const slG=ctx.createLinearGradient(s.x1,s.y1,s.x2,s.y2);
    slG.addColorStop(0,'rgba(255,255,255,0)');
    slG.addColorStop(0.2,'rgba(180,240,255,0.9)');
    slG.addColorStop(0.5,'rgba(100,210,255,1)');
    slG.addColorStop(0.8,'rgba(220,160,255,0.8)');
    slG.addColorStop(1,'rgba(255,100,255,0)');
    ctx.globalAlpha=s.life;
    ctx.strokeStyle=slG;ctx.lineWidth=16*s.life;
    ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(s.x1,s.y1);ctx.lineTo(s.x2,s.y2);ctx.stroke();
    // Inner bright core
    ctx.lineWidth=5*s.life;ctx.strokeStyle=`rgba(255,255,255,${s.life*.9})`;
    ctx.beginPath();ctx.moveTo(s.x1,s.y1);ctx.lineTo(s.x2,s.y2);ctx.stroke();
  }
  ctx.globalCompositeOperation='source-over';
  ctx.globalAlpha=1;
  // Rings
  for(let i=rings.length-1;i>=0;i--){
    const r=rings[i];const s=dt*.06;
    r.r+=5*s;r.life-=.007*s;
    if(r.life<=0){rings.splice(i,1);continue;}
    ctx.strokeStyle=`rgba(255,200,150,${r.life*.7})`;ctx.lineWidth=3;
    ctx.shadowColor='rgba(255,160,80,0.5)';ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=0;
    // Second ring offset
    if(r.r>30){
      ctx.strokeStyle=`rgba(200,100,255,${r.life*.4})`;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(r.x,r.y,r.r*1.3,0,Math.PI*2);ctx.stroke();
    }
  }
  // Shards
  for(let i=shards.length-1;i>=0;i--){
    const s=shards[i];const sc=dt*.06;
    s.x+=s.vx*sc;s.y+=s.vy*sc;s.vy+=.09*sc;s.rot+=s.vr*sc;s.life-=.0014*dt;
    if(s.life<=0){shards.splice(i,1);continue;}
    ctx.save();ctx.translate(s.x,s.y);ctx.rotate(s.rot);ctx.globalAlpha=s.life;
    const sg=ctx.createLinearGradient(-s.w/2,0,s.w/2,0);
    sg.addColorStop(0,'#6a4a9a');sg.addColorStop(0.5,'#4a2d6a');sg.addColorStop(1,'#2a1540');
    ctx.fillStyle=sg;ctx.fillRect(-s.w/2,-s.h/2,s.w,s.h);
    ctx.strokeStyle='rgba(180,140,255,0.6)';ctx.lineWidth=1;
    ctx.strokeRect(-s.w/2,-s.h/2,s.w,s.h);
    ctx.restore();
  }
  // Glow rays
  if(glow.length>0){
    ctx.globalCompositeOperation='screen';
    const cx=king.x,cy=king.y-king.H/2;
    const radial=ctx.createRadialGradient(cx,cy,0,cx,cy,340);
    radial.addColorStop(0,'rgba(255,255,255,0.95)');
    radial.addColorStop(0.15,'rgba(220,180,255,0.7)');
    radial.addColorStop(0.4,'rgba(140,80,220,0.45)');
    radial.addColorStop(0.7,'rgba(80,40,140,0.2)');
    radial.addColorStop(1,'rgba(0,0,0,0)');
    const maxLife=glow[0]?glow[0].life:0;
    ctx.globalAlpha=maxLife*.9;
    ctx.fillStyle=radial;ctx.beginPath();ctx.arc(cx,cy,340,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    for(let i=glow.length-1;i>=0;i--){
      const g=glow[i];g.life-=.00085*dt;
      if(g.life<=0){glow.splice(i,1);continue;}
      ctx.globalAlpha=g.life*.6;
      ctx.strokeStyle='rgba(255,255,255,0.9)';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(cx,cy);
      ctx.lineTo(cx+Math.cos(g.a)*g.len*g.life*2,cy+Math.sin(g.a)*g.len*g.life*2);
      ctx.stroke();
    }
    ctx.globalCompositeOperation='source-over';
    ctx.globalAlpha=1;
  }
}

// ── Timeline update ──
function updateTimeline(t,dt){
  king.x=canvas.width*.68;king.y=GY();
  king.breathT+=dt*.06;
  if(king.hitFlash>0)king.hitFlash=Math.max(0,king.hitFlash-.015);
  if(king.recoilX)king.recoilX*=.92;

  // Subtitles
  let sub='',subShow=false;
  for(const s of SUBS){if(t>=s.t0&&t<s.t1){sub=s.text;subShow=true;}}
  subEl.textContent=sub;
  subEl.classList.toggle('show',subShow);
  let top='',topShow=false;
  for(const s of TOPS){if(t>=s.t0&&t<s.t1){top=s.text;topShow=true;}}
  topEl.textContent=top;topEl.classList.toggle('show',topShow);

  // ─ INTRO ─
  if(t<PH.INTRO_E){
    const p=t/PH.INTRO_E;
    hero.x=lerp(canvas.width*.22,canvas.width*.25,p);
    hero.y=GY();
    hero.pose.run=0;hero.pose.kick=0;hero.pose.clash=0;
    CAM.set(canvas.width/2,GY()-100,.88);
  }
  // ─ RUN ─
  if(t>=PH.RUN&&t<PH.RUN_E){
    const p=easeInOut((t-PH.RUN)/(PH.RUN_E-PH.RUN));
    hero.x=lerp(-300,canvas.width*.5,p);
    hero.y=GY();
    hero.pose.run=p*2.5;hero.pose.kick=0;hero.pose.clash=0;
    CAM.set(lerp(canvas.width*.2,canvas.width*.5,p),GY()-80,lerp(.9,1.15,p));
    if(Math.random()<.16)spawnDust(hero.x,GY(),3);
  }
  // ─ CLASH ─
  if(t>=PH.CLASH&&t<PH.CLASH_E){
    const p=(t-PH.CLASH)/(PH.CLASH_E-PH.CLASH);
    const si=Math.min(3,Math.floor(p*4));
    if(si>lastSlash){
      lastSlash=si;
      const sx1=hero.x+35,sy1=hero.y-70;
      const sx2=king.x-60+si*14,sy2=king.y-king.H+60+si*22;
      spawnSlash(sx1,sy1,sx2,sy2);
      spawnSparks((sx1+sx2)/2,(sy1+sy2)/2,24);
      spawnRing(sx2,sy2);
      hitStop(90);
      flashScreen('rgba(255,220,180,0.5)',50);
      king.recoilX=14;king.hitFlash=0.85;
      king.cracks=Math.min(1,(king.cracks||0)+.28);
      CAM.shake(10,130);
    }
    hero.x=canvas.width*.52;hero.y=GY();
    hero.pose.run=.5;hero.pose.clash=easeInOut(p);hero.pose.kick=0;
    CAM.set(lerp(canvas.width*.55,(hero.x+king.x)/2,p),GY()-95,lerp(1.1,1.38,p));
  }
  // ─ SLOW-MO ─
  if(t>=PH.SLOWMO&&t<PH.SLOWMO_E){
    const p=easeOut((t-PH.SLOWMO)/(PH.SLOWMO_E-PH.SLOWMO));
    hero.x=canvas.width*.54;hero.y=GY();
    hero.pose.run=0;hero.pose.clash=0;hero.pose.kick=p;
    CAM.set(lerp(canvas.width*.52,hero.x+50,p),GY()-110,lerp(1.28,1.65,p));
  }
  // ─ IMPACT ─
  if(t>=PH.IMPACT&&t<PH.IMPACT_E){
    const p=(t-PH.IMPACT)/(PH.IMPACT_E-PH.IMPACT);
    hero.x=canvas.width*.56;hero.y=GY();
    hero.pose.kick=1;hero.pose.run=0;hero.pose.clash=0;
    if(!king.shattered&&p>.1){
      king.shattered=true;
      makeShards();
      CAM.shake(32,600);
      hitStop(140);
      flashScreen('rgba(255,240,200,0.9)',100);
    }
    const view=p<.35?0:p<.7?1:2;
    if(view===0)CAM.set(lerp(canvas.width*.54,hero.x+50,p*3),GY()-100,lerp(1.45,1.85,p*3));
    else if(view===1)CAM.set(king.x-30,king.y-king.H+70,2.1);
    else CAM.set((hero.x+king.x)/2,king.y-king.H/2,1.8);
  }
  // ─ GLOW ─
  if(t>=PH.GLOW&&t<PH.GLOW_E){
    const p=(t-PH.GLOW)/(PH.GLOW_E-PH.GLOW);
    CAM.set(lerp((hero.x+king.x)/2,canvas.width/2,p),lerp(GY()-100,GY()-160,p),lerp(1.55,1.0,p));
  }
  // ─ LOOP ─ stop repeating after the sequence finishes
  if(t>=PH.LOOP){
    // mark finished so we do not reset and restart the animation
    animationDone = true;
    // clamp t to the end so final frame stays visible (no resetting of state)
    // (no array resets — leave final shattered state visible)
  }
}

// ── Main loop ──
function frame(ts){
  if(!startTime){startTime=ts;lastTime=ts;}
  const t=ts-startTime;
  let dt=ts-lastTime;
  if(performance.now()<hitStopUntil)dt=0;
  lastTime=ts;

  // Persistent trail fade (not clear)
  ctx.save();ctx.fillStyle='rgba(5,2,15,0.3)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.restore();

  updateTimeline(t,dt);
  CAM.update(dt);

  CAM.apply();
  drawBG(t);

  // Hero trail
  hero.trail.push({x:hero.x,y:hero.y,pose:{...hero.pose},a:.85});
  if(hero.trail.length>20)hero.trail.shift();
  hero.trail.forEach(tr=>tr.a*=.88);
  for(const tr of hero.trail){
    if(tr.a<.05)continue;
    ctx.save();ctx.globalAlpha=tr.a*.35;
    drawHero(tr.x,tr.y,tr.pose,tr.a*.35);
    ctx.restore();
  }

  // Boss alpha fade on shatter
  let bossAlpha=1;
  if(king.shattered){
    const fd=clamp((t-PH.IMPACT)/(PH.GLOW-PH.IMPACT),0,1);
    bossAlpha=1-fd;
  }
  drawKing(bossAlpha);

  if(king.shattered){
    updateDraw(dt);
  } else {
    updateDraw(dt);
  }
  drawHero(hero.x,hero.y,hero.pose,1);

  CAM.restore();

  if(!animationDone) requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// Background music
const bgMusic = new Audio('yessir.mp3');
bgMusic.loop = true;
bgMusic.volume = 0.5;

// Must start on user interaction (browser rule)
document.addEventListener('click', () => bgMusic.play(), { once: true });
document.addEventListener('keydown', () => bgMusic.play(), { once: true });

</script>
