<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crystal Climb</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; font-family: "Press Start 2P",monospace; overflow: hidden; }
  canvas { border: none; image-rendering: pixelated; display: block; }
  #ui { color: #fff; text-align: center; margin-bottom: 8px; font-size: 14px; letter-spacing: 1px; }
  #return-hub-btn { display:none; position:fixed; left:50%; transform:translateX(-50%); bottom:28px; font-family:'Press Start 2P',monospace; font-size:12px; padding:10px 16px; background:linear-gradient(135deg,#6b2bd1,#c060ff); color:#fff; border-radius:10px; border:1px solid rgba(255,255,255,0.08); cursor:pointer; z-index:60; box-shadow:0 0 20px rgba(160,80,255,0.35); }
  #give-crystal-btn { position:fixed; right:16px; top:16px; font-family:'Press Start 2P',monospace; font-size:11px; padding:8px 12px; background:linear-gradient(135deg,#00b4ff,#0066ff); color:#fff; border-radius:8px; border:1px solid rgba(255,255,255,0.08); cursor:pointer; z-index:61; box-shadow:0 0 20px rgba(0,120,255,0.25); }
</style>
</head>
<body>
<div id="ui"><span id="heightDisplay">HEIGHT: 0%</span> &nbsp;|&nbsp; <span id="status">WASD · Shift=Sprint · Double-Jump · G=Gust · Stomp! · Grab 🧪 Fire Potions!</span></div>
<canvas id="game"></canvas>
<button id="return-hub-btn" aria-hidden="true" style="display:none;">CLICK TO RETURN TO HUB</button>
<button id="give-crystal-btn" aria-hidden="false">GIVE CRYSTAL</button>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
ctx.imageSmoothingEnabled=false;
const TILE=32,COLS=Math.floor(window.innerWidth/TILE),ROWS=Math.floor((window.innerHeight-40)/TILE);
canvas.width=COLS*TILE;canvas.height=ROWS*TILE;
const T_EMPTY=0,T_FLOOR=1,T_WALL=2,T_LAVA=3,T_SPIKE=4,T_PLATFORM=7,T_CRYSTAL=9,T_BOUNCE=10,T_ICE=11,T_WEB=12,T_CHECKPOINT=13,T_LAVA_PLAT=14;
const WORLD_H=480,CRYSTAL_ROW=8,GRAVITY=28,JUMP_V=-15.5,DJUMP_V=-14.5,BOUNCE_V=-21;
const RUN_SPD=4.4,SPRINT_SPD=7.2,WEB_SPD=1.3,ICE_ACC=0.32,PW=10,PH=22;
const LAVA_ZONE_START=360,LAVA_ZONE_END=180;

// Fire resistance potion
const POTION_DURATION = 15; // seconds
let potions = []; // {wx, wy, collected, bobPhase}
let fireResistTimer = 0; // seconds remaining
let fireResistActive = false;
let climberCrystalSaved = false;
function markCrystalComplete(idx){
  try{ localStorage.setItem(`crystal_${idx}`,'1'); }catch(_e){}
}

// Rising lava (no static lava platforms)
let lavaRiseY=WORLD_H*TILE,lavaRising=false;
const lavaRiseSpeed=18;

// Cave background
const caveLayers=[];
function buildCaveLayers(){
  caveLayers.length=0;
  const L0=[];
  for(let x=0;x<canvas.width+80;x+=28+Math.floor(Math.random()*18)){
    const h=60+Math.random()*120;
    L0.push({x,h,w:18+Math.random()*24,side:Math.random()<0.5?'top':'bot',col:`rgb(${14+Math.random()*8|0},${10+Math.random()*6|0},${8+Math.random()*6|0})`});
  }
  caveLayers.push({items:L0,parallax:0.06});
  const L1=[];
  for(let x=10;x<canvas.width+60;x+=22+Math.floor(Math.random()*28)){
    const top=Math.random()<0.55,h=30+Math.random()*90,w=7+Math.random()*16;
    L1.push({x,h,w,top,col:`rgb(${22+Math.random()*12|0},${16+Math.random()*8|0},${12+Math.random()*8|0})`});
  }
  caveLayers.push({items:L1,parallax:0.18});
  const L2=[];
  for(let side=0;side<2;side++){
    for(let i=0;i<14;i++){
      const wy=Math.random()*WORLD_H*TILE,w=24+Math.random()*44,h=18+Math.random()*36;
      const pts=[],segs=4+Math.floor(Math.random()*4);
      for(let s=0;s<=segs;s++)pts.push({dx:(side===0?1:-1)*(Math.random()*w),dy:-h/2+s*(h/segs)+(Math.random()-0.5)*10});
      L2.push({x:side===0?0:canvas.width,wy,pts,side,col:`rgb(${18+Math.random()*14|0},${12+Math.random()*10|0},${10+Math.random()*8|0})`});
    }
  }
  caveLayers.push({items:L2,parallax:0.32});
  const L3=[];
  const mineralCols=[['#1a3a5a','#2a5a8a','#3a7aaa'],['#3a1a4a','#5a2a7a','#7a3aaa'],['#1a3a1a','#2a5a2a','#3a8a3a'],['#3a2a0a','#6a4a0a','#9a6a1a'],['#3a1a1a','#6a2a1a','#9a3a2a'],['#1a3a3a','#2a6a6a','#3a9a9a']];
  for(let i=0;i<90;i++){
    const mc=mineralCols[Math.floor(Math.random()*mineralCols.length)];
    L3.push({wx:12+Math.random()*(COLS*TILE-24),wy:60+Math.random()*(WORLD_H*TILE-120),ang:Math.random()*Math.PI,len:12+Math.random()*38,branches:1+Math.floor(Math.random()*4),cols:mc,size:2+Math.random()*4,type:'vein'});
  }
  for(let i=0;i<35;i++){
    const mc=mineralCols[Math.floor(Math.random()*mineralCols.length)];
    L3.push({wx:20+Math.random()*(COLS*TILE-40),wy:80+Math.random()*(WORLD_H*TILE-160),ang:0,len:0,branches:0,cols:mc,size:4+Math.random()*8,type:'crystal',spires:2+Math.floor(Math.random()*4)});
  }
  caveLayers.push({items:L3,parallax:0.0});
}
buildCaveLayers();

// Fire sparkles
const fireSparkles=[];
function initFireSparkles(){
  fireSparkles.length=0;
  for(let i=0;i<40;i++)fireSparkles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vy:-(0.3+Math.random()*0.8),vx:(Math.random()-0.5)*0.4,life:Math.random(),maxLife:0.6+Math.random()*0.8,size:1+Math.random()*2.5,col:Math.random()<0.5?'#ff6600':Math.random()<0.5?'#ffcc00':'#ff3300'});
}
initFireSparkles();
function updateFireSparkles(dt){
  for(const s of fireSparkles){
    s.x+=s.vx;s.y+=s.vy;s.life-=dt*0.55;
    if(s.life<=0){
      const side=Math.floor(Math.random()*4);
      if(side===0){s.x=Math.random()*canvas.width;s.y=canvas.height-5;}
      else if(side===1){s.x=5;s.y=Math.random()*canvas.height;}
      else if(side===2){s.x=canvas.width-5;s.y=Math.random()*canvas.height;}
      else{s.x=Math.random()*canvas.width;s.y=canvas.height*0.6+Math.random()*canvas.height*0.4;}
      s.vy=-(0.3+Math.random()*0.8);s.vx=(Math.random()-0.5)*0.4;s.life=s.maxLife;s.size=1+Math.random()*2.5;
    }
  }
}
function drawFireSparkles(){
  for(const s of fireSparkles){
    const al=Math.max(0,s.life/s.maxLife)*0.6;
    ctx.save();ctx.globalAlpha=al;ctx.fillStyle=s.col;ctx.fillRect(s.x,s.y,s.size,s.size);ctx.restore();
  }
}

// World and reachability
let worldMap=[],checkpoints=[],vanishTiles=[];
// Physics: vx is px/frame, vy changes by GRAVITY*dt per frame (dt≈1/60)
const _DT=1/60;
const MAX_JUMP_HEIGHT_PX=(JUMP_V*JUMP_V)/(2*GRAVITY*_DT); // pixels
const FRAMES_TO_APEX=Math.abs(JUMP_V)/(GRAVITY*_DT);
const MAX_REACH_PX=SPRINT_SPD*(FRAMES_TO_APEX*2); // ~478px
const MAX_GAP_TILES=Math.floor(MAX_REACH_PX/TILE)-1; // ~13 tiles

function generateWorld(){
  worldMap=[];checkpoints=[];vanishTiles=[];potions=[];
  for(let r=0;r<WORLD_H;r++)worldMap[r]=new Uint8Array(COLS);
  for(let r=0;r<WORLD_H;r++){worldMap[r][0]=T_WALL;worldMap[r][COLS-1]=T_WALL;}
  for(let c=0;c<COLS;c++){worldMap[WORLD_H-1][c]=T_FLOOR;worldMap[WORLD_H-2][c]=T_FLOOR;}
  const mid=COLS>>1;
  for(let c=mid-3;c<=mid+3;c++)worldMap[CRYSTAL_ROW+1][c]=T_CRYSTAL;
  const rng=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;

  // Platform sizing: length 4–8 tiles, well spread across the screen
  // Usable columns: 2 .. COLS-3 (excluding walls)
  const PLAT_MIN_LEN = 4;
  const PLAT_MAX_LEN = Math.min(8, Math.floor((COLS - 4) / 2));
  // Minimum horizontal gap between platform edges (in tiles)
  const MIN_H_GAP = 3;
  // Vertical gap between rows
  const MIN_V_GAP = 3;
  const MAX_V_GAP = Math.min(5, Math.floor(MAX_JUMP_HEIGHT_PX / TILE) - 1);

  let row = WORLD_H - 4;
  let lastPlatRow = row;
  let checkpointInterval = 0;
  // Track last platform center so next one lands reachably but not too close
  let lastCenter = mid;

  // Place a wide starting pad near the bottom
  const startLen = 10;
  const startS = mid - Math.floor(startLen / 2);
  for(let c = startS; c < startS + startLen && c < COLS - 1; c++) worldMap[row][c] = T_PLATFORM;
  lastCenter = mid;
  row -= rng(MIN_V_GAP, MAX_V_GAP);

  while(row > CRYSTAL_ROW + 4){
    if(row <= CRYSTAL_ROW + 4) break;
    const zone = row < 180 ? 'cave' : 'start';
    const tt = (zone === 'cave' && Math.random() < 0.07) ? T_ICE : T_PLATFORM;

    const len = rng(PLAT_MIN_LEN, PLAT_MAX_LEN);

    // Spread platforms across the full width, biased away from the last center
    // Max horizontal jump reach in tiles
    const maxJumpTiles = MAX_GAP_TILES;
    // The new platform center must be within jump reach of last center
    const reachMin = Math.max(2 + Math.floor(len / 2), lastCenter - maxJumpTiles + Math.floor(len/2));
    const reachMax = Math.min(COLS - 3 - Math.ceil(len / 2), lastCenter + maxJumpTiles - Math.ceil(len/2));
    // Clamp to valid range
    const cMin = Math.max(2 + Math.floor(len / 2), reachMin);
    const cMax = Math.min(COLS - 3 - Math.ceil(len / 2), reachMax);

    // Prefer placing platform away from last center (bias to opposite side)
    let centerC;
    if(cMin >= cMax){
      centerC = Math.round((cMin + cMax) / 2);
    } else {
      // Split available space into thirds; pick from the third that is furthest from last center
      const third = Math.floor((cMax - cMin) / 3);
      if(lastCenter < mid){
        // Last was left-ish, prefer right side
        centerC = rng(cMin + third, cMax);
      } else {
        // Last was right-ish, prefer left side
        centerC = rng(cMin, cMax - third);
      }
    }
    centerC = Math.max(cMin, Math.min(cMax, centerC));
    const s = centerC - Math.floor(len / 2);
    const sEnd = s + len;

    // Place platform tiles
    for(let c = s; c < sEnd && c < COLS - 1; c++){
      worldMap[row][c] = tt;
      if(tt === T_PLATFORM && Math.random() < 0.04 && row > 1 && c > s && c < sEnd - 1)
        worldMap[row-1][c] = T_SPIKE;
    }
    if(tt === T_PLATFORM && Math.random() < 0.18 && len > 3){
      const wc = s + rng(1, len - 2);
      if(worldMap[row-1] && worldMap[row-1][wc] === T_EMPTY) worldMap[row-1][wc] = T_WEB;
    }
    if(Math.random() < 0.09){
      const bc = s + rng(1, Math.max(1, len - 2));
      if(worldMap[row-1] && worldMap[row-1][bc] === T_EMPTY) worldMap[row-1][bc] = T_BOUNCE;
    }
    checkpointInterval += (lastPlatRow - row);
    if(checkpointInterval >= 55 && tt === T_PLATFORM){
      const cc = s + Math.floor(len / 2);
      worldMap[row-1][cc] = T_CHECKPOINT;
      checkpoints.push({row: row-1, col: cc, active: false});
      checkpointInterval = 0;
    }
    // Spawn potions in the lava zone (rows 180–360) floating above platforms
    if(row >= LAVA_ZONE_END && row <= LAVA_ZONE_START && tt === T_PLATFORM && Math.random() < 0.28 && len >= 3){
      const pc = s + rng(1, len - 2);
      potions.push({wx: (pc + 0.5) * TILE, wy: (row - 1.5) * TILE, collected: false, bobPhase: Math.random() * Math.PI * 2});
    }
    // Spawn lava platforms in the lava zone — separate floating platforms made of lava rock
    if(row >= LAVA_ZONE_END && row <= LAVA_ZONE_START && Math.random() < 0.35){
      const lpLen = rng(3, 6);
      // Place lava platform offset from the main platform so player must cross it
      const side = Math.random() < 0.5 ? 1 : -1;
      const lpCenter = Math.max(2 + Math.floor(lpLen/2), Math.min(COLS - 3 - Math.ceil(lpLen/2), centerC + side * rng(5, 10)));
      const lpS = lpCenter - Math.floor(lpLen / 2);
      const lpRow = row - rng(1, 3); // same height range or slightly above
      if(lpRow > CRYSTAL_ROW + 4){
        for(let c = lpS; c < lpS + lpLen && c < COLS - 1 && c > 0; c++){
          if(worldMap[lpRow][c] === T_EMPTY) worldMap[lpRow][c] = T_LAVA_PLAT;
        }
      }
    }
    lastCenter = centerC;
    lastPlatRow = row;
    row -= rng(MIN_V_GAP, MAX_V_GAP);
  }
  // Vanish platforms
  for(let r=0;r<WORLD_H;r++){
    for(let c=0;c<COLS;c++){
      const inLZ=r>=LAVA_ZONE_END&&r<=LAVA_ZONE_START;
      if(worldMap[r][c]===T_PLATFORM&&!inLZ&&Math.random()<0.16)
        vanishTiles.push({row:r,col:c,timer:2+Math.random()*3,state:'solid',warnT:0});
    }
  }
}
generateWorld();

// Tile cache and art
const TC={};
function drawStoneCracks(x,col,row,seed){
  const r1=((col*7+row*13+seed)%5),r2=((col*3+row*17+seed)%4);
  x.strokeStyle='rgba(0,0,0,0.35)';x.lineWidth=0.8;
  const cx1=4+r1*4,cy1=3+r2*3;
  x.beginPath();x.moveTo(cx1,cy1);x.lineTo(cx1+5+r2,cy1+4+r1);x.lineTo(cx1+3,cy1+9+r2);x.stroke();
  const cx2=TILE-8-r2*3,cy2=5+r1*4;
  x.beginPath();x.moveTo(cx2,cy2);x.lineTo(cx2-4-r1,cy2+6+r2);x.stroke();
  x.strokeStyle='rgba(0,0,0,0.22)';x.lineWidth=1;
  x.beginPath();x.moveTo(0,TILE/2+r1-2);x.lineTo(TILE,TILE/2+r1-2);x.stroke();
  x.beginPath();x.moveTo(TILE/2+r2-2,0);x.lineTo(TILE/2+r2-2,TILE);x.stroke();
}

function buildStaticTile(type,zoneKey,col,row){
  const key=type+'_'+zoneKey+'_'+col+'_'+row;
  if(TC[key])return TC[key];
  const c2=document.createElement('canvas');c2.width=TILE;c2.height=TILE;
  const x=c2.getContext('2d');x.imageSmoothingEnabled=false;
  if(type===T_WALL){
    x.fillStyle='#2a1e14';x.fillRect(0,0,TILE,TILE);x.fillStyle='#221810';x.fillRect(1,1,TILE-2,TILE-2);
    x.fillStyle='#3a2a1c';x.fillRect(1,1,TILE-2,4);x.fillStyle='#2e2016';
    x.fillRect(2,2,13,13);x.fillRect(17,2,13,13);x.fillRect(2,17,13,13);x.fillRect(17,17,13,13);
    x.strokeStyle='rgba(0,0,0,0.5)';x.lineWidth=1;
    x.strokeRect(2,2,13,13);x.strokeRect(17,2,13,13);x.strokeRect(2,17,13,13);x.strokeRect(17,17,13,13);
    drawStoneCracks(x,col,row,3);
    x.fillStyle='rgba(0,0,0,0.4)';x.fillRect(0,0,2,2);x.fillRect(TILE-2,0,2,2);x.fillRect(0,TILE-2,2,2);x.fillRect(TILE-2,TILE-2,2,2);
  }else if(type===T_FLOOR){
    x.fillStyle='#3a2a1c';x.fillRect(0,0,TILE,TILE);x.fillStyle='#2e2016';x.fillRect(1,1,TILE-2,TILE-2);
    x.fillStyle='#4a3828';x.fillRect(1,1,TILE-2,5);x.fillStyle='rgba(40,60,20,0.22)';x.fillRect(3,8,8,6);x.fillRect(18,14,9,5);
    x.fillStyle='#342418';x.fillRect(2,6,13,11);x.fillRect(17,6,13,11);
    x.strokeStyle='rgba(0,0,0,0.4)';x.lineWidth=1;x.strokeRect(2,6,13,11);x.strokeRect(17,6,13,11);
    drawStoneCracks(x,col,row,7);
    x.fillStyle='rgba(0,0,0,0.4)';x.fillRect(0,0,2,2);x.fillRect(TILE-2,0,2,2);x.fillRect(0,TILE-2,2,2);x.fillRect(TILE-2,TILE-2,2,2);
  }else if(type===T_PLATFORM){
    const base=zoneKey==='c'?'#1e2c3a':zoneKey==='l'?'#2c1208':'#1e1608';
    const mid2=zoneKey==='c'?'#162030':zoneKey==='l'?'#200e06':'#181006';
    const topC=zoneKey==='c'?'#3a5a78':zoneKey==='l'?'#6a2810':'#4a3418';
    const edgeC=zoneKey==='c'?'#4a7a9a':zoneKey==='l'?'#a04820':'#6a5228';
    const glintC=zoneKey==='c'?'rgba(120,200,255,0.22)':zoneKey==='l'?'rgba(255,120,40,0.20)':'rgba(200,160,80,0.18)';
    const s1=((col*11+row*7)%5),s2=((col*5+row*13)%4),s3=((col*7+row*3)%6),s4=((col*9+row*17)%5);
    x.fillStyle=mid2;x.fillRect(0,0,TILE,TILE);x.fillStyle=base;x.fillRect(0,4,TILE,TILE-4);
    x.fillStyle=topC;x.beginPath();x.moveTo(0,TILE);x.lineTo(0,7+s1);x.lineTo(4,5+s2);x.lineTo(9,8+s3);x.lineTo(14,4+s1);x.lineTo(19,7+s4);x.lineTo(24,5+s2);x.lineTo(28,6+s3);x.lineTo(TILE,5+s4);x.lineTo(TILE,TILE);x.closePath();x.fill();
    x.strokeStyle=edgeC;x.lineWidth=1.5;x.beginPath();x.moveTo(0,7+s1);x.lineTo(4,5+s2);x.lineTo(9,8+s3);x.lineTo(14,4+s1);x.lineTo(19,7+s4);x.lineTo(24,5+s2);x.lineTo(28,6+s3);x.lineTo(TILE,5+s4);x.stroke();
    x.strokeStyle=glintC;x.lineWidth=1;x.beginPath();x.moveTo(0,6+s1);x.lineTo(4,4+s2);x.lineTo(9,7+s3);x.lineTo(14,3+s1);x.lineTo(19,6+s4);x.lineTo(24,4+s2);x.lineTo(28,5+s3);x.lineTo(TILE,4+s4);x.stroke();
    const r1b=((col*13+row*5)%3),r2b=((col*7+row*11)%4);
    x.fillStyle='rgba(0,0,0,0.38)';x.fillRect(2+r1b,10,4+r2b,6);x.fillRect(18+r2b,12,5+r1b,5);
    if(((col+row)%3)===0)x.fillRect(10,9,4,4);
    x.strokeStyle='rgba(0,0,0,0.45)';x.lineWidth=1;
    x.beginPath();x.moveTo(8+s1,8);x.lineTo(7+s2,TILE);x.stroke();
    x.beginPath();x.moveTo(20+s3,7);x.lineTo(21+s1,TILE);x.stroke();
    if(((col*row)%4)===0){x.beginPath();x.moveTo(14+s2,9);x.lineTo(13+s3,TILE);x.stroke();}
    x.fillStyle='rgba(0,0,0,0.5)';x.fillRect(0,TILE-4,TILE,4);
    x.fillStyle='rgba(0,0,0,0.25)';x.fillRect(0,8,2,TILE-8);x.fillRect(TILE-2,8,2,TILE-8);
    drawStoneCracks(x,col,row,11);
  }else if(type===T_SPIKE){
    const sw=TILE/3;
    const heights=[6+((col*7+row*3)%10),4+((col*3+row*11)%12),7+((col*13+row*7)%9)];
    const widths=[sw*0.82,sw*0.76,sw*0.88];
    for(let i=0;i<3;i++){
      const cx2=i*sw+sw/2,tipY=heights[i],hw2=widths[i]/2,baseY=TILE-8;
      x.save();x.shadowColor='rgba(0,0,0,0.55)';x.shadowBlur=5;x.shadowOffsetX=1;x.shadowOffsetY=2;
      x.fillStyle='rgba(10,10,10,0.6)';x.beginPath();x.moveTo(cx2-hw2+1,baseY+1);x.lineTo(cx2,tipY+2);x.lineTo(cx2+hw2-1,baseY+1);x.closePath();x.fill();x.restore();
      const sg=x.createLinearGradient(cx2-hw2,baseY,cx2+hw2,baseY);
      sg.addColorStop(0,'#383838');sg.addColorStop(0.4,'#d0d0d0');sg.addColorStop(1,'#484848');
      x.fillStyle=sg;x.beginPath();x.moveTo(cx2-hw2+1,baseY);x.lineTo(cx2,tipY);x.lineTo(cx2+hw2-1,baseY);x.closePath();x.fill();
      const lfg=x.createLinearGradient(cx2-hw2,baseY,cx2,tipY);
      lfg.addColorStop(0,'rgba(255,255,255,0.0)');lfg.addColorStop(1,'rgba(255,255,255,0.30)');
      x.fillStyle=lfg;x.beginPath();x.moveTo(cx2-hw2+1,baseY);x.lineTo(cx2,tipY);x.lineTo(cx2,baseY);x.closePath();x.fill();
      x.fillStyle='rgba(0,0,0,0.20)';x.beginPath();x.moveTo(cx2,tipY);x.lineTo(cx2+hw2-1,baseY);x.lineTo(cx2,baseY);x.closePath();x.fill();
      const hg=x.createLinearGradient(0,baseY-4,0,TILE);

// Tile helpers
function tileAt(wx,wy){const c=wx/TILE|0,r=wy/TILE|0;if(r<0||r>=WORLD_H||c<0||c>=COLS)return T_WALL;return worldMap[r][c];}
function solidFull(wx,wy){const t=tileAt(wx,wy);return t===T_FLOOR||t===T_WALL||t===T_CRYSTAL||t===T_ICE;}
function solidTop(wx,wy){const t=tileAt(wx,wy);return t===T_PLATFORM||t===T_BOUNCE||t===T_LAVA_PLAT;}
function lethal(wx,wy){const t=tileAt(wx,wy);return t===T_LAVA||t===T_SPIKE;}
function bouncy(wx,wy){return tileAt(wx,wy)===T_BOUNCE;}
function icy(wx,wy){return tileAt(wx,wy)===T_ICE;}
function webby(wx,wy){return tileAt(wx,wy)===T_WEB;}

function pDust(x,y){for(let i=0;i<3;i++)addP(x,y,(Math.random()-.5)*2,-Math.random()*1.4,.4,'#c0b090');}
function pDeath(x,y){for(let i=0;i<9;i++)addP(x,y,(Math.random()-.5)*4,(Math.random()-.5)*4,.7,'#cc2020');}
function pBounce(x,y){for(let i=0;i<5;i++)addP(x,y,(Math.random()-.5)*3,-Math.random()*2,.3,'#ffee00');}
function pDJ(x,y){for(let i=0;i<6;i++)addP(x,y,(Math.random()-.5)*3,Math.random()*1.5,.4,'#00ccff');}
function pMDie(x,y){for(let i=0;i<7;i++)addP(x,y,(Math.random()-.5)*3,(Math.random()-.5)*3,.55,'#ff5500');}
function pCheckpoint(x,y){for(let i=0;i<12;i++)addP(x,y,(Math.random()-.5)*4,(Math.random()*-3),.8,'#00ff88');}
function pGust(x,y,facing){for(let i=0;i<8;i++)addP(x,y,-facing*(2+Math.random()*3),(Math.random()-.5)*2.5,.35,Math.random()<0.5?'#aaffcc':'#ffffff');}

}

// Update
function update(dt){
  if(P.isDying||P.won)return;
  const L=keys['ArrowLeft']||keys['a']||keys['A'];
  const R=keys['ArrowRight']||keys['d']||keys['D'];
  const U=keys['ArrowUp']||keys['w']||keys['W'];
  const G=keys['g']||keys['G'];
  const sprint=keys['Shift'];
  const hw=PW/2,hh=PH/2;

  P.inWeb=webby(P.px,P.py)||webby(P.px-hw+2,P.py)||webby(P.px+hw-2,P.py);
  P.sprinting=sprint&&(L||R)&&P.onGround&&!P.inWeb;
  P.moving=!!(L||R);

  P.vy+=GRAVITY*dt*(P.inWeb?.22:1);
  const spd=P.inWeb?WEB_SPD:P.sprinting?SPRINT_SPD:RUN_SPD;
  if(P.onIce&&!P.inWeb){
    if(L)P.vx=Math.max(P.vx-ICE_ACC,-spd);
    else if(R)P.vx=Math.min(P.vx+ICE_ACC,spd);
    else P.vx*=.97;
  }else{
    if(L)P.vx=P.inWeb?Math.max(P.vx-.14,-spd):-spd;
    else if(R)P.vx=P.inWeb?Math.min(P.vx+.14,spd):spd;
    else P.vx*=P.inWeb?.84:.48;
  }
  if(L)P.facing=-1;if(R)P.facing=1;

  if(U&&!P.jumpDown){
    if(P.onGround&&!P.inWeb){P.vy=JUMP_V;P.onGround=false;P.jumpsLeft=1;pDust(P.px,P.py+hh);}
    else if(P.jumpsLeft>0&&!P.inWeb){P.vy=DJUMP_V;P.jumpsLeft=0;pDJ(P.px,P.py);flash('#aaddff',.08);}
  }
  P.jumpDown=U;

  if(G&&!P.gustDown&&!P.inWeb){
    P.vx=P.facing*(SPRINT_SPD*2.2);
    if(!P.onGround)P.vy=Math.min(P.vy,-3);
    flash('#aaffee',0.10);pGust(P.px,P.py,P.facing);
  }
  P.gustDown=G;

  const speed=Math.abs(P.vx);
  if(P.onGround&&speed>0.5)P.walkPhase+=dt*speed*0.38;
  if(!P.onGround)P.airTime=Math.min(P.airTime+dt,0.5);
  else P.airTime=Math.max(P.airTime-dt*8,0);

  P.trailTimer+=dt;
  if(P.trailTimer>0.055){
    P.trailTimer=0;
    if(P.moving||!P.onGround){P.trail.push({x:P.px,y:P.py,f:P.facing});if(P.trail.length>6)P.trail.shift();}
    else{if(P.trail.length>0)P.trail.shift();}
  }

  P.px+=P.vx;
  if(solidFull(P.px-hw,P.py)){P.px=((P.px-hw)/TILE|0)*TILE+TILE+hw+.5;P.vx=0;}
  if(solidFull(P.px+hw,P.py)){P.px=((P.px+hw)/TILE|0)*TILE-hw-.5;P.vx=0;}

  P.py+=P.vy;P.onGround=false;P.onIce=false;
  if(P.vy>=0){
    const fy=P.py+hh;
    if(solidFull(P.px-hw+2,fy)||solidFull(P.px+hw-2,fy)){
      P.py=(fy/TILE|0)*TILE-hh;P.onGround=true;P.jumpsLeft=2;
      if(P.vy>5)pDust(P.px,P.py+hh);
      if(bouncy(P.px-hw+2,fy+2)||bouncy(P.px+hw-2,fy+2)){
        P.vy=BOUNCE_V;P.onGround=false;P.jumpsLeft=2;flash('#ffff00',.18);rumble(2);pBounce(P.px,P.py+hh);
      }else{
        P.vy=0;if(icy(P.px,fy+2)||icy(P.px-hw+2,fy+2))P.onIce=true;
      }
    }else{
      const prevFy=fy-P.vy,tileRow=fy/TILE|0,tileTop=tileRow*TILE;
      if(prevFy<=tileTop&&fy>=tileTop){
        if(solidTop(P.px-hw+2,fy)||solidTop(P.px+hw-2,fy)){
          P.py=tileTop-hh;P.onGround=true;P.jumpsLeft=2;
          if(P.vy>5)pDust(P.px,P.py+hh);
          if(bouncy(P.px-hw+2,tileTop+2)||bouncy(P.px+hw-2,tileTop+2)){
            P.vy=BOUNCE_V;P.onGround=false;P.jumpsLeft=2;flash('#ffff00',.18);rumble(2);pBounce(P.px,P.py+hh);
          }else{
            P.vy=0;if(icy(P.px,tileTop+2)||icy(P.px-hw+2,tileTop+2))P.onIce=true;
          }
        }
      }
    }
  }
  if(P.vy<0){
    const hy=P.py-hh;
    if(solidFull(P.px-hw+2,hy)||solidFull(P.px+hw-2,hy)){P.py=((hy/TILE|0)+1)*TILE+hh;P.vy=0;}
  }

  if(P.px<hw){P.px=hw;P.vx=0;}if(P.px>COLS*TILE-hw){P.px=COLS*TILE-hw;P.vx=0;}
  if(P.py>WORLD_H*TILE-hh){P.py=WORLD_H*TILE-hh;P.vy=0;P.onGround=true;P.jumpsLeft=2;}
  if(P.py<hh){P.py=hh;P.vy=0;}

  // Fire resistance potion pickup
  for(const pot of potions){
    if(pot.collected)continue;
    if(Math.abs(P.px-pot.wx)<20&&Math.abs(P.py-pot.wy)<20){
      pot.collected=true;
      fireResistTimer=POTION_DURATION;
      fireResistActive=true;
      pPotion(P.px,P.py);
      flash('#ff8800',0.35);
      rumble(1.5);
    }
  }

  // Update fire resistance timer
  if(fireResistActive){
    fireResistTimer-=dt;
    if(fireResistTimer<=0){fireResistTimer=0;fireResistActive=false;}
  }

  // Lethality check — fire resistance protects from lava only (not spikes)
  const checks=[[P.px,P.py],[P.px-hw+2,P.py],[P.px+hw-2,P.py],[P.px,P.py-hh+2],[P.px,P.py+hh-2]];
  for(const[cx,cy]of checks){
    const t=tileAt(cx,cy);
    if(t===T_SPIKE){P.isDying=true;pDeath(P.px,P.py);flash('#ff0000',.55);return;}
    if(t===T_LAVA&&!fireResistActive){P.isDying=true;pDeath(P.px,P.py);flash('#ff0000',.55);return;}
  }
  // Lava platform contact — lethal from below/sides without resistance; standing on top also burns
  if(!fireResistActive){
    // Check if standing ON a lava platform (feet touching top surface)
    const fy=P.py+hh;
    if(tileAt(P.px-hw+2,fy)===T_LAVA_PLAT||tileAt(P.px+hw-2,fy)===T_LAVA_PLAT||
       tileAt(P.px-hw+2,fy-1)===T_LAVA_PLAT||tileAt(P.px+hw-2,fy-1)===T_LAVA_PLAT){
      P.isDying=true;pDeath(P.px,P.py);flash('#ff4400',.65);return;
    }
    // Check sides/body collision with lava platform
    for(const[cx,cy]of checks){
      if(tileAt(cx,cy)===T_LAVA_PLAT){P.isDying=true;pDeath(P.px,P.py);flash('#ff4400',.65);return;}
    }
  }
  // Rising lava — fire resistance protects from it too
  if(P.py+hh>=lavaRiseY&&!fireResistActive){P.isDying=true;pDeath(P.px,P.py);flash('#ff4400',.7);return;}

  for(const cp of checkpoints){
    if(!cp.active&&Math.abs(P.px-cp.col*TILE-TILE/2)<20&&Math.abs(P.py-cp.row*TILE-TILE/2)<24){
      cp.active=true;
      spawnPX=cp.col*TILE+TILE/2;
      // Spawn player standing on top of the platform tile — row*TILE is top of tile, minus half player height
      spawnPY=cp.row*TILE - PH/2 - 2;
      pCheckpoint(P.px,P.py);flash('#00ff88',.25);
    }
  }

  if(!lavaRising){
    for(const v of vanishTiles){
      if(v.state==='solid'&&Math.abs(P.px-v.col*TILE-TILE/2)<TILE*1.2&&Math.abs(P.py-(v.row*TILE-4))<12){v.state='warn';v.warnT=0.9;}
    }
  }

  for(const m of monsters){
    if(m.dead)continue;
    if(Math.abs(P.px-m.px)<20&&Math.abs(P.py-m.py)<22){
      if(P.vy>1&&P.py<m.py){
        m.dead=true;m.squish=.38;pMDie(m.px,m.py-camDraw);flash('#ffff00',.15);P.vy=JUMP_V*.6;P.jumpsLeft=1;
      }else{
        P.isDying=true;pDeath(P.px,P.py);flash('#ff0000',.55);return;
      }
    }
  }

  if((P.py/TILE|0)<=CRYSTAL_ROW+2){
    P.won=true;flash('#00ffff',.7);rumble(5);
    if(!climberCrystalSaved){climberCrystalSaved=true;markCrystalComplete(3);}
    try{ showReturnButton(); }catch(_e){}
  }

  const pRow=P.py/TILE|0,zoneId=pRow<180?2:pRow<360?1:0;
  if(zoneId!==lastZoneRow){
    lastZoneRow=zoneId;
    if(zoneId===2){zoneBannerText='✦ UPPER CAVE';zoneBannerCol='#55bbff';}
    else if(zoneId===1){zoneBannerText='🔥 LAVA ZONE — RUN!';zoneBannerCol='#ff5500';lavaRising=true;}
    else{zoneBannerText='⛏ LOWER CAVE';zoneBannerCol='#bbaa88';}
    zoneBannerAlpha=1;zoneBannerTimer=2.5;
  }
}

function updateLava(dt){
  if(!lavaRising||P.isDying||P.won)return;
  lavaRiseY-=lavaRiseSpeed*dt;
  lavaRiseY=Math.max(lavaRiseY,LAVA_ZONE_END*TILE);
}
function updateVanish(dt){
  if(lavaRising)return;
  for(const v of vanishTiles){
    if(v.state==='warn'){v.warnT-=dt;if(v.warnT<=0){v.state='gone';v.timer=2+Math.random()*2;worldMap[v.row][v.col]=T_EMPTY;delete TC[T_PLATFORM+'_'+(v.row<180?'c':v.row<360?'l':'s')+'_'+v.col+'_'+v.row];}}
    else if(v.state==='gone'){v.timer-=dt;if(v.timer<=0){v.state='solid';worldMap[v.row][v.col]=T_PLATFORM;}}
  }
}
function updateMonsters(dt){
  for(const m of monsters){
    if(m.dead){m.squish=Math.max(0,m.squish-dt);continue;}
    m.at+=dt;if(m.at>.14){m.at=0;m.af=(m.af+1)%6;}
    m.px+=m.vx;
    if(m.px<=m.platL){m.px=m.platL;m.vx=Math.abs(m.vx);}
    if(m.px>=m.platR){m.px=m.platR;m.vx=-Math.abs(m.vx);}
    m.facing=m.vx>0?1:-1;
  }
}
function updateCamera(dt){
  const target=Math.max(0,Math.min((WORLD_H-ROWS)*TILE,P.py-ROWS*TILE*.40));
  cameraY+=(target-cameraY)*(1-Math.pow(0.004,dt));
}
let camDraw=0;

// Drawing
function drawBackground(){
  const pRow=camDraw/TILE|0,isUpper=pRow<180,isLava=pRow>=180&&pRow<360;
  const t=Date.now()*0.001;
  ctx.fillStyle=isUpper?'#080612':isLava?'#120604':'#0a0806';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  for(const m of caveLayers[3].items){
    const sy=m.wy-camDraw;if(sy<-60||sy>canvas.height+60)continue;
    const pulse=Math.sin(t*1.2+m.wx*0.008+m.wy*0.004)*0.4+0.6;
    if(m.type==='vein'){
      ctx.save();ctx.translate(m.wx,sy);ctx.rotate(m.ang);
      for(let b=0;b<m.branches;b++){
        const bAng=(b/m.branches)*Math.PI-(Math.PI/2)+m.ang*0.3;
        ctx.save();ctx.rotate(bAng);
        ctx.globalAlpha=0.12*pulse;ctx.strokeStyle=m.cols[2];ctx.lineWidth=m.size*2.5;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,m.len);ctx.stroke();
        ctx.globalAlpha=0.28*pulse;ctx.strokeStyle=m.cols[1];ctx.lineWidth=m.size;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,m.len);ctx.stroke();
        ctx.globalAlpha=0.55*pulse;ctx.strokeStyle=m.cols[0];ctx.lineWidth=Math.max(1,m.size*0.5);ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,m.len);ctx.stroke();
        ctx.restore();
      }
      ctx.restore();
    }else{
      ctx.save();ctx.translate(m.wx,sy);
      for(let s=0;s<m.spires;s++){
        const sAng=-Math.PI/2+(s-(m.spires-1)/2)*0.45,sLen=m.size*(0.6+s%2*0.4)*2,sw=Math.max(2,m.size*0.35);
        ctx.save();ctx.rotate(sAng);
        ctx.globalAlpha=0.15*pulse;ctx.fillStyle=m.cols[2];ctx.beginPath();ctx.moveTo(-sw*2,0);ctx.lineTo(0,-sLen*1.1);ctx.lineTo(sw*2,0);ctx.closePath();ctx.fill();
        ctx.globalAlpha=0.5*pulse;ctx.fillStyle=m.cols[1];ctx.beginPath();ctx.moveTo(-sw,0);ctx.lineTo(0,-sLen);ctx.lineTo(sw,0);ctx.closePath();ctx.fill();
        ctx.globalAlpha=0.7*pulse;ctx.fillStyle=m.cols[2];ctx.beginPath();ctx.moveTo(-sw*0.3,0);ctx.lineTo(0,-sLen*0.9);ctx.lineTo(sw*0.1,-sLen*0.3);ctx.closePath();ctx.fill();
        ctx.restore();
      }
      ctx.restore();
    }
  }
  for(const col of caveLayers[0].items){
    ctx.save();ctx.globalAlpha=0.55;ctx.fillStyle=col.col;
    if(col.side==='top'){ctx.beginPath();ctx.moveTo(col.x,0);ctx.lineTo(col.x+col.w*0.3,col.h*0.6);ctx.lineTo(col.x+col.w*0.5,col.h);ctx.lineTo(col.x+col.w*0.7,col.h*0.7);ctx.lineTo(col.x+col.w,0);ctx.closePath();ctx.fill();}
    else{ctx.beginPath();ctx.moveTo(col.x,canvas.height);ctx.lineTo(col.x+col.w*0.3,canvas.height-col.h*0.6);ctx.lineTo(col.x+col.w*0.5,canvas.height-col.h);ctx.lineTo(col.x+col.w*0.7,canvas.height-col.h*0.7);ctx.lineTo(col.x+col.w,canvas.height);ctx.closePath();ctx.fill();}
    ctx.restore();
  }
  for(const st of caveLayers[1].items){
    ctx.save();ctx.globalAlpha=0.38;ctx.fillStyle=st.col;
    if(st.top){ctx.beginPath();ctx.moveTo(st.x-st.w/2,0);ctx.lineTo(st.x-st.w*0.15,st.h*0.7);ctx.lineTo(st.x,st.h);ctx.lineTo(st.x+st.w*0.15,st.h*0.75);ctx.lineTo(st.x+st.w/2,0);ctx.closePath();ctx.fill();}
    else{const by=canvas.height;ctx.beginPath();ctx.moveTo(st.x-st.w/2,by);ctx.lineTo(st.x-st.w*0.15,by-st.h*0.7);ctx.lineTo(st.x,by-st.h);ctx.lineTo(st.x+st.w*0.15,by-st.h*0.75);ctx.lineTo(st.x+st.w/2,by);ctx.closePath();ctx.fill();}
    ctx.restore();
  }
  for(const rock of caveLayers[2].items){
    const sy2=rock.wy-camDraw*(1-caveLayers[2].parallax);if(sy2<-80||sy2>canvas.height+80)continue;
    ctx.save();ctx.globalAlpha=0.48;ctx.fillStyle=rock.col;
    ctx.beginPath();const startX=rock.side===0?0:canvas.width;
    ctx.moveTo(startX,sy2+rock.pts[0].dy);
    for(const pt of rock.pts)ctx.lineTo(startX+pt.dx,sy2+pt.dy);
    ctx.lineTo(startX,sy2+rock.pts[rock.pts.length-1].dy);ctx.closePath();ctx.fill();
    ctx.restore();
  }
  ctx.save();
  if(isUpper){
    const g=ctx.createRadialGradient(canvas.width/2,canvas.height/2,40,canvas.width/2,canvas.height/2,canvas.width*0.7);
    g.addColorStop(0,'rgba(20,10,60,0.28)');g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);
  }else if(isLava){
    const g=ctx.createRadialGradient(canvas.width/2,canvas.height*0.8,20,canvas.width/2,canvas.height*0.8,canvas.width*0.8);
    g.addColorStop(0,'rgba(80,20,0,0.35)');g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);
  }else{
    const g=ctx.createRadialGradient(canvas.width/2,canvas.height*0.5,20,canvas.width/2,canvas.height*0.5,canvas.width*0.7);
    g.addColorStop(0,'rgba(30,15,8,0.3)');g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);
  }
  ctx.restore();
}

function drawRisingLava(){
  if(lavaRiseY>=WORLD_H*TILE)return;
  const screenY=lavaRiseY-camDraw;if(screenY>canvas.height+40)return;
  // If fire resistant, draw lava with a blue-ish overlay hint
  const t=Date.now()*0.001;
  ctx.fillStyle='#1a0500';ctx.fillRect(0,Math.max(0,screenY+12),canvas.width,canvas.height);
  ctx.beginPath();ctx.moveTo(0,canvas.height+10);ctx.lineTo(0,screenY);
  for(let wx=0;wx<=canvas.width;wx+=6)ctx.lineTo(wx,screenY+Math.sin(wx*0.04+t*3)*4+Math.sin(wx*0.08-t*2)*2);
  ctx.lineTo(canvas.width,canvas.height+10);ctx.closePath();
  const lg=ctx.createLinearGradient(0,screenY-10,0,screenY+30);
  lg.addColorStop(0,'#ff6600');lg.addColorStop(0.3,'#dd3300');lg.addColorStop(1,'#1a0500');
  ctx.fillStyle=lg;ctx.fill();
  ctx.beginPath();ctx.moveTo(0,screenY);
  for(let wx=0;wx<=canvas.width;wx+=6)ctx.lineTo(wx,screenY+Math.sin(wx*0.04+t*3)*4+Math.sin(wx*0.08-t*2)*2);
  ctx.strokeStyle= fireResistActive ? '#66aaff' : '#ffaa00';ctx.lineWidth=2.5;ctx.stroke();
  const gg=ctx.createLinearGradient(0,screenY-40,0,screenY+10);
  gg.addColorStop(0,'rgba(255,80,0,0)');gg.addColorStop(1,'rgba(255,80,0,0.28)');
  ctx.fillStyle=gg;ctx.fillRect(0,screenY-40,canvas.width,50);
  for(let bx=40;bx<canvas.width-40;bx+=canvas.width/7){
    const bobble=Math.sin(bx*0.05+t*2.5)*3;
    const bg=ctx.createRadialGradient(bx,screenY+6+bobble,1,bx,screenY+6+bobble,10);
    bg.addColorStop(0,'#ffcc00');bg.addColorStop(0.5,'#ff4400');bg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=bg;ctx.beginPath();ctx.arc(bx,screenY+6+bobble,10,0,Math.PI*2);ctx.fill();
  }
  // Fire resistance: player can walk on lava surface — show blue safe line
  if(fireResistActive){
    ctx.save();ctx.globalAlpha=0.4;
    ctx.strokeStyle='#88ccff';ctx.lineWidth=3;ctx.setLineDash([8,6]);
    ctx.beginPath();ctx.moveTo(0,screenY);ctx.lineTo(canvas.width,screenY);ctx.stroke();
    ctx.setLineDash([]);ctx.restore();
  }
  const dist=P.py-lavaRiseY;
  if(dist<TILE*6&&dist>0&&!fireResistActive){ctx.fillStyle=`rgba(255,40,0,${Math.max(0,1-dist/(TILE*6))*0.22})`;ctx.fillRect(0,0,canvas.width,canvas.height);}
}

let lavaT=0;
function drawTile(col,row,sx,sy){
  const type=worldMap[row][col];if(type===T_EMPTY)return;
  if(type===T_LAVA){
    const fl=Math.sin(lavaT+col*.5+row*.7)*22;
    ctx.fillStyle=`rgb(${196+fl|0},${42+fl*.3|0},5)`;ctx.fillRect(sx,sy,TILE,TILE);
    ctx.fillStyle=`rgba(255,${116+fl|0},0,.44)`;ctx.fillRect(sx+2,sy+2,TILE-4,TILE-4);return;
  }
  if(type===T_LAVA_PLAT){
    const fl=Math.sin(lavaT+col*.6+row*.4)*18;
    // Dark lava rock base
    ctx.fillStyle='#1a0800';ctx.fillRect(sx,sy,TILE,TILE);
    ctx.fillStyle='#2e1005';ctx.fillRect(sx+1,sy+6,TILE-2,TILE-7);
    // Cracked rock surface
    ctx.fillStyle='#3a1808';ctx.fillRect(sx,sy+6,TILE,4);
    ctx.fillStyle='#4a2010';ctx.fillRect(sx,sy+6,TILE,2);
    // Lava cracks glowing on surface
    ctx.strokeStyle=`rgba(255,${80+fl|0},0,0.85)`;ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(sx+4,sy+7);ctx.lineTo(sx+10,sy+5);ctx.lineTo(sx+14,sy+8);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx+18,sy+6);ctx.lineTo(sx+24,sy+4);ctx.lineTo(sx+28,sy+7);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx+8,sy+8);ctx.lineTo(sx+16,sy+6);ctx.stroke();
    // Lava glow along top edge
    const lg=ctx.createLinearGradient(sx,sy,sx,sy+10);
    lg.addColorStop(0,`rgba(255,${100+fl|0},0,${0.55+fl/80})`);
    lg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=lg;ctx.fillRect(sx,sy,TILE,10);
    // Dripping lava drops on sides
    const drip1=Math.sin(lavaT*1.3+col)*3,drip2=Math.sin(lavaT*1.1+col*1.4)*3;
    ctx.fillStyle=`rgba(255,${90+fl|0},0,0.7)`;
    ctx.beginPath();ctx.ellipse(sx+6,sy+10+drip1,2,3,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(sx+TILE-6,sy+10+drip2,2,3,0,0,Math.PI*2);ctx.fill();
    // Top surface glow pulse
    ctx.fillStyle=`rgba(255,${60+fl|0},0,${0.12+fl/200})`;ctx.fillRect(sx,sy,TILE,8);
    return;
  }
  if(type===T_CRYSTAL){
    const p=Math.sin(Date.now()*.003)*.28+.72;
    ctx.fillStyle=`rgba(12,${192*p|0},${232*p|0},1)`;ctx.fillRect(sx,sy,TILE,TILE);
    ctx.fillStyle=`rgba(130,255,255,${.2*p})`;ctx.fillRect(sx+2,sy+2,TILE-4,TILE-4);
    ctx.strokeStyle=`rgba(195,255,255,${.55*p})`;ctx.lineWidth=1;ctx.strokeRect(sx+1,sy+1,TILE-2,TILE-2);return;
  }
  if(type===T_WEB){ctx.drawImage(webTile,sx,sy);return;}
  if(type===T_CHECKPOINT){
    const flagT=Date.now()*.003,active=checkpoints.find(cp=>cp.row===row&&cp.col===col)?.active;
    ctx.fillStyle='#888';ctx.fillRect(sx+TILE/2-1,sy+2,3,TILE-4);
    const fw=Math.sin(flagT)*2;ctx.fillStyle=active?'#00ff88':'#ff4444';
    ctx.beginPath();ctx.moveTo(sx+TILE/2+1,sy+4);ctx.lineTo(sx+TILE/2+12+fw,sy+8);ctx.lineTo(sx+TILE/2+10+fw,sy+14);ctx.lineTo(sx+TILE/2+1,sy+18);ctx.closePath();ctx.fill();
    if(active){ctx.strokeStyle='rgba(0,255,136,0.4)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(sx+TILE/2,sy+TILE/2,14,0,Math.PI*2);ctx.stroke();}
    return;
  }
  ctx.drawImage(buildStaticTile(type,row<180?'c':row<360?'l':'s',col,row),sx,sy);
  const vt=type===T_PLATFORM?vanishTiles.find(v=>v.row===row&&v.col===col):null;
  if(vt&&vt.state==='warn'){
    const fl2=Math.sin(Date.now()*0.018)*0.5+0.5;
    ctx.save();ctx.globalAlpha=0.55*fl2;ctx.fillStyle='#ff4400';ctx.fillRect(sx,sy,TILE,TILE);
    ctx.globalAlpha=0.9*fl2;ctx.strokeStyle='#ffaa00';ctx.lineWidth=2;ctx.strokeRect(sx+1,sy+1,TILE-2,TILE-2);ctx.restore();
  }
}

function drawGem(){
  const mx=(COLS>>1)*TILE+TILE/2,wy=CRYSTAL_ROW*TILE-camDraw;
  if(wy<-80||wy>canvas.height+80)return;
  const t=Date.now()*.002,bob=Math.sin(t)*5,glow=.55+Math.sin(t*1.3)*.28,cy2=wy+bob;
  const g=ctx.createRadialGradient(mx,cy2,1,mx,cy2,42);
  g.addColorStop(0,`rgba(0,255,255,${glow})`);g.addColorStop(1,'rgba(0,90,220,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(mx,cy2,42,0,Math.PI*2);ctx.fill();
  ctx.save();ctx.translate(mx,cy2);
  ctx.beginPath();ctx.moveTo(0,-22);ctx.lineTo(10,-8);ctx.lineTo(14,6);ctx.lineTo(0,20);ctx.lineTo(-14,6);ctx.lineTo(-10,-8);ctx.closePath();
  const cg=ctx.createLinearGradient(0,-22,0,20);
  cg.addColorStop(0,'#00ffff');cg.addColorStop(.5,'#0092ff');cg.addColorStop(1,'#004488');ctx.fillStyle=cg;ctx.fill();
  ctx.strokeStyle='rgba(215,255,255,.88)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-22);ctx.lineTo(8,-4);ctx.lineTo(0,-8);ctx.closePath();ctx.fillStyle='rgba(255,255,255,.42)';ctx.fill();
  ctx.restore();
  ctx.fillStyle=`rgba(195,255,255,${.72+glow*.25})`;ctx.font='bold 12px Courier New';ctx.textAlign='center';ctx.fillText('CRYSTAL',mx,cy2-36);
}

// Draw all potions
function drawPotions(){
  const t=Date.now()*0.001;
  for(const pot of potions){
    if(pot.collected)continue;
    drawPotion(pot.wx,pot.wy,t);
  }
}

// Monsters drawing
function drawMonsterTank(m,sx,sy){
  const bob=Math.sin(m.af*1.0)*1.5,fast=m.fast;ctx.save();ctx.translate(sx,sy);ctx.scale(m.facing,1);
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.ellipse(0,13,14,4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3a3a3a';ctx.fillRect(-14,6+bob,28,7);ctx.fillStyle='#555';ctx.fillRect(-14,6+bob,28,2);
  ctx.strokeStyle='#222';ctx.lineWidth=1;
  for(let i=-12;i<14;i+=5){ctx.beginPath();ctx.moveTo(i,6+bob);ctx.lineTo(i,13+bob);ctx.stroke();}
  ctx.fillStyle='#444';ctx.beginPath();ctx.ellipse(-10,10+bob,5,5,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(10,10+bob,5,5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#222';ctx.beginPath();ctx.ellipse(-10,10+bob,2,2,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(10,10+bob,2,2,0,0,Math.PI*2);ctx.fill();
  const hg=ctx.createLinearGradient(0,-8+bob,0,8+bob);
  hg.addColorStop(0,fast?'#8a6a10':'#6a7a50');hg.addColorStop(1,fast?'#5a4008':'#3a4a28');
  ctx.fillStyle=hg;ctx.fillRect(-12,-6+bob,24,13);
  ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(-12,-6+bob,24,3);

function drawMonsterSpider(m,sx,sy){

  ctx.fillStyle='#cc0000';ctx.beginPath();ctx.moveTo(-4,0+bob);ctx.lineTo(-2,4+bob);ctx.lineTo(-4,8+bob);ctx.lineTo(-6,4+bob);ctx.closePath();ctx.fill();
  const cg=ctx.createRadialGradient(3,-1+bob,1,3,-1+bob,7);

function drawMonsters(){

// Player draw
function drawPlayer(){
  const sx=Math.round(P.px),sy=Math.round(P.py-camDraw);
  if(P.isDying){
    ctx.save();ctx.translate(sx,sy);ctx.rotate(P.dt*15);ctx.globalAlpha=Math.max(0,1-P.dt*2);
    ctx.fillStyle='#f5c98a';ctx.fillRect(-6,-14,12,28);ctx.restore();return;
  }
  for(let i=0;i<P.trail.length;i++){
    const tr=P.trail[i],al=(i/P.trail.length)*0.09;
    ctx.save();ctx.globalAlpha=al;ctx.translate(Math.round(tr.x),Math.round(tr.y-camDraw));ctx.scale(tr.f,1);
    ctx.fillStyle=fireResistActive?'#ff8800':'#3a7a3a';ctx.fillRect(-5,-4,10,9);ctx.fillStyle='#f5c98a';ctx.fillRect(-4,-14,8,8);ctx.restore();
  }
  ctx.save();ctx.translate(sx,sy);ctx.scale(P.facing,1);
  const wc=Math.sin(P.walkPhase);
  const walkActive=P.onGround&&P.moving;
  const legL=walkActive?wc*4:0,legR=walkActive?-wc*4:0;
  const bodyBob=walkActive?Math.abs(wc)*1.5:0;
  const armSwing=walkActive?wc*3:0;
  const airStretch=P.airTime*0.4;
  const scaleY=1+airStretch*(P.vy<0?0.12:-0.06),scaleX=1-airStretch*0.06;
  ctx.scale(scaleX,scaleY);

  // Fire resistance glow around player
  if(fireResistActive){
    const glow=0.55+Math.sin(Date.now()*0.006)*0.25;
    const rg=ctx.createRadialGradient(0,0,5,0,0,26);
    rg.addColorStop(0,`rgba(255,150,30,${glow*0.35})`);
    rg.addColorStop(1,'rgba(255,80,0,0)');
    ctx.fillStyle=rg;ctx.beginPath();ctx.arc(0,0,26,0,Math.PI*2);ctx.fill();
    // Fire wisps
    const t=Date.now()*0.004;
    for(let w=0;w<5;w++){
      const ang=w*1.26+t,r=14+Math.sin(t*2+w)*3;
      ctx.fillStyle=`rgba(255,${100+w*30|0},0,0.5)`;
      ctx.beginPath();ctx.arc(Math.cos(ang)*r,Math.sin(ang)*r,2,0,Math.PI*2);ctx.fill();
    }
  }

  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath();ctx.ellipse(0,13,9,3,0,0,Math.PI*2);ctx.fill();
  // Legs — orange tint if fire resistant
  const legCol=fireResistActive?'#8b3a00':'#2a3060';
  const legDark=fireResistActive?'#5a2800':'#1a1a40';
  ctx.fillStyle=legCol;ctx.fillRect(-6,4+bodyBob+legL,5,9);ctx.fillStyle=legDark;ctx.fillRect(-7,12+bodyBob+legL,6,3);
  ctx.fillStyle=legCol;ctx.fillRect(1,4+bodyBob+legR,5,9);ctx.fillStyle=legDark;ctx.fillRect(1,12+bodyBob+legR,6,3);
  // Body — fiery color when resistant
  const bodyCol=fireResistActive?'#cc5500':'#3a7a3a';
  const bodyDark=fireResistActive?'#aa3300':'#2e602e';
  ctx.fillStyle=bodyCol;ctx.fillRect(-6,-5+bodyBob,12,10);ctx.fillStyle=bodyDark;ctx.fillRect(-6,-5+bodyBob,12,2);
  ctx.fillStyle=bodyCol;ctx.fillRect(-9,-4+bodyBob-armSwing,3,8);ctx.fillStyle='#f5c98a';ctx.fillRect(-9,3+bodyBob-armSwing,3,3);
  ctx.fillStyle=bodyCol;ctx.fillRect(6,-4+bodyBob+armSwing,3,8);ctx.fillStyle='#f5c98a';ctx.fillRect(6,3+bodyBob+armSwing,3,3);
  ctx.fillStyle='#f5c98a';ctx.fillRect(-5,-15+bodyBob,10,10);
  ctx.fillStyle='#5ab4f0';ctx.fillRect(-3,-13+bodyBob,2,2);ctx.fillRect(1,-13+bodyBob,2,2);
  ctx.fillStyle='#000';ctx.fillRect(-2,-12+bodyBob,1,1);ctx.fillRect(2,-12+bodyBob,1,1);
  ctx.fillStyle='#fff';ctx.fillRect(-3,-13+bodyBob,1,1);ctx.fillRect(1,-13+bodyBob,1,1);
  // Hat — flame on top if fire resistant
  ctx.fillStyle='#f0b830';ctx.fillRect(-5,-16+bodyBob,11,4);ctx.fillRect(-6,-14+bodyBob,3,4);ctx.fillRect(4,-14+bodyBob,3,3);
  ctx.fillStyle='#f8d060';ctx.fillRect(-3,-16+bodyBob,5,2);
  if(fireResistActive){
    // Flame on hat
    const tf=Date.now()*0.006,fl=Math.sin(tf)*2;
    ctx.fillStyle='#ff4400';ctx.beginPath();ctx.moveTo(-3,-17+bodyBob);ctx.quadraticCurveTo(-1+fl,-23+bodyBob,2,-17+bodyBob);ctx.closePath();ctx.fill();
    ctx.fillStyle='#ffaa00';ctx.beginPath();ctx.moveTo(-1,-17+bodyBob);ctx.quadraticCurveTo(0+fl,-21+bodyBob,2,-17+bodyBob);ctx.closePath();ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0.5,-18+bodyBob,1,0,Math.PI*2);ctx.fill();
  }
  if(!P.onGround&&P.jumpsLeft>0&&!P.inWeb){
    ctx.globalAlpha=0.40;ctx.strokeStyle='#00ccff';ctx.lineWidth=2;
    ctx.beginPath();ctx.ellipse(0,0,13,13,0,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;
  }
  if(P.inWeb){ctx.globalAlpha=0.3;ctx.fillStyle='#cccccc';ctx.fillRect(-8,-16+bodyBob,16,32);ctx.globalAlpha=1;}
  if(P.sprinting){ctx.globalAlpha=0.18;ctx.fillStyle='#ffaa00';ctx.fillRect(-9,-16+bodyBob,18,32);ctx.globalAlpha=1;}
  if(P.onIce){ctx.globalAlpha=0.22;ctx.fillStyle='#aaddff';ctx.fillRect(-6,-14+bodyBob,12,28);ctx.globalAlpha=1;}
  ctx.restore();
}

// Particles update
function drawParticles(){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    ctx.save();ctx.globalAlpha=Math.max(0,p.life/p.ml);ctx.fillStyle=p.col;
    ctx.fillRect(Math.round(p.x-2),Math.round(p.y-camDraw-2),4,4);ctx.restore();
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.life-=0.016;
    if(p.life<=0)parts.splice(i,1);
  }
}

// Main loop
let lastTime=0,deathTimer=0;
function gameLoop(ts){
  const dt=Math.min((ts-lastTime)/1000,0.05);lastTime=ts;
  lavaT+=dt*2;fireBakeT+=dt;
  if(fireBakeT>0.06){bakeFire(ts*0.001);fireBakeT=0;}
  if(rumT>0){rumT-=dt;const mag=rumM*(rumT/0.45);rumX=(Math.random()-.5)*mag*2;rumY=(Math.random()-.5)*mag*2;}
  else{rumX=0;rumY=0;}
  nextRum-=dt;if(nextRum<=0){rumble(0.8+Math.random()*0.6);nextRum=10+Math.random()*12;}
  if(!P.isDying&&!P.won){
    update(dt);updateLava(dt);updateVanish(dt);updateMonsters(dt);updateCamera(dt);updateFireSparkles(dt);
  }else if(P.isDying){
    P.dt+=dt;updateCamera(dt);deathTimer+=dt;
    if(deathTimer>2.2){
      const hasCP=checkpoints.some(cp=>cp.active);
      resetP(hasCP, false);  // respawn at checkpoint or start, never regenerate world
      deathTimer=0;
    }
  }
  camDraw=Math.round(cameraY+rumY);
  drawBackground();
  const r0=Math.max(0,(camDraw/TILE|0)-1),r1=Math.min(WORLD_H-1,((camDraw+canvas.height)/TILE|0)+2);
  for(let r=r0;r<=r1;r++)for(let c=0;c<COLS;c++)if(worldMap[r][c]!==T_EMPTY)drawTile(c,r,Math.round(c*TILE+rumX),Math.round(r*TILE-camDraw+rumY));
  drawGem();drawPotions();drawRisingLava();drawMonsters();drawPlayer();drawParticles();
  ctx.save();ctx.globalAlpha=0.55;ctx.drawImage(fireTile,rumX,rumY);ctx.restore();
  ctx.drawImage(vigTile,0,0);drawFireSparkles();
  if(flashA>0){ctx.save();ctx.globalAlpha=flashA;ctx.fillStyle=flashC;ctx.fillRect(0,0,canvas.width,canvas.height);ctx.restore();flashA=Math.max(0,flashA-dt*3.5);}
  drawHUD(dt);
  try{ saveRun(); }catch(_e){}
  if(P.isDying||P.won)drawEnd(P.won);
  if(keys['r']||keys['R']){
    const hasCP=checkpoints.some(cp=>cp.active);
    if(hasCP){
      // Teleport to last checkpoint, keep everything
      resetP(true, false);deathTimer=0;
    } else {
      // No checkpoint — just respawn at start, keep level
      resetP(false, false);deathTimer=0;
    }
  }
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(ts=>{lastTime=ts;requestAnimationFrame(gameLoop);});
